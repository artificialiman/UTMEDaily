<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Artificial Iman — Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

:root {
  --gold: #C9A84C;
  --gold-bright: #F0CB6A;
  --gold-dim: #7A5E1E;
}

body {
  background: #000;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: none;
}

.stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── FLASH OVERLAY ── */
.flash {
  position: absolute;
  inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  animation:
    flash1 0.09s ease-out 0.12s,
    flash2 0.07s ease-out 0.60s;
}

@keyframes flash1 { 0%{opacity:1} 100%{opacity:0} }
@keyframes flash2 { 0%{opacity:0.7} 100%{opacity:0} }

/* ── RADIAL BURST ── */
.burst {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 50%,
    rgba(201,168,76,0.18) 0%,
    transparent 70%);
  opacity: 0;
  pointer-events: none;
  z-index: 1;
  animation: burst1 0.6s ease-out 0.62s;
}

@keyframes burst1 {
  0%  { opacity: 0; transform: scale(0.4); }
  30% { opacity: 1; }
  100%{ opacity: 0; transform: scale(1.6); }
}

/* ── SCANLINES ── */
.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.06) 3px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  z-index: 15;
}

/* ── CROWN ── */
.crown {
  position: absolute;
  top: calc(50% - clamp(4rem, 14vw, 16rem) - clamp(2rem, 3.5vw, 5rem));
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  opacity: 0;
  animation: crownDrop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 1.05s forwards;
}

.crown svg {
  width: clamp(32px, 5vw, 70px);
  height: auto;
  display: block;
}

@keyframes crownDrop {
  0%  { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(0.6); }
  100%{ opacity: 1; transform: translateX(-50%) translateY(0)     scale(1);   }
}

/* ── ARTIFICIAL ── */
.word-artificial {
  font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
  font-size: clamp(2.4rem, 7.5vw, 9rem);
  color: var(--gold);
  letter-spacing: 0.3em;
  line-height: 1;
  position: relative;
  z-index: 5;
  opacity: 0;
  animation:
    artificialIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) 0.16s forwards,
    glitchA      0.18s steps(3, end)                   0.47s;
}

@keyframes artificialIn {
  from { opacity:0; transform: translateY(-35px) scaleY(1.4); filter: blur(3px); }
  to   { opacity:1; transform: translateY(0)     scaleY(1);   filter: blur(0);   }
}

@keyframes glitchA {
  0%  { clip-path: inset(0 0 70% 0); transform: translateX(-8px); color: #fff; }
  33% { clip-path: inset(30% 0 40% 0); transform: translateX(8px);  color: var(--gold-bright); }
  66% { clip-path: inset(60% 0 10% 0); transform: translateX(-4px); color: #fff; }
  100%{ clip-path: inset(0); transform: translateX(0); color: var(--gold); }
}

/* ── IMAN ── */
.word-iman {
  font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
  font-size: clamp(6rem, 22vw, 27rem);
  color: #fff;
  letter-spacing: 0.04em;
  line-height: 0.82;
  position: relative;
  z-index: 5;
  opacity: 0;
  animation:
    imanSlam  0.5s  cubic-bezier(0.12, 0.95, 0.2, 1.04) 0.64s forwards,
    imanPulse 2.4s  ease-in-out                           1.4s  infinite;
}

@keyframes imanSlam {
  0%  { opacity:0; transform: scale(2.2) translateY(15px); filter: blur(10px); }
  55% { opacity:1; transform: scale(0.97);                 filter: blur(0);    }
  78% { transform: scale(1.025); }
  100%{ opacity:1; transform: scale(1) translateY(0); }
}

@keyframes imanPulse {
  0%,100%{ text-shadow: 0 0 0   rgba(201,168,76,0); }
  50%    { text-shadow: 0 0 50px rgba(201,168,76,0.35), 0 0 100px rgba(201,168,76,0.15); }
}

/* ── GOLD ACCENT LINE ── */
.accent-line {
  width: 0;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  position: relative;
  z-index: 4;
  margin-top: 0.5vw;
  animation: lineExpand 0.5s cubic-bezier(0.22, 1, 0.36, 1) 1.05s forwards;
}

@keyframes lineExpand {
  to { width: clamp(160px, 40vw, 600px); }
}

/* ── TAGLINE ── */
.tagline {
  position: absolute;
  bottom: 7%;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
  font-size: clamp(0.55rem, 1.3vw, 1.2rem);
  color: var(--gold);
  letter-spacing: 0.45em;
  white-space: nowrap;
  opacity: 0;
  animation: tagFade 0.5s ease-out 1.55s forwards;
}

@keyframes tagFade {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 0.8; transform: translateX(-50%) translateY(0); }
}

/* ── HINT ── */
.hint {
  position: absolute;
  bottom: 1.5%;
  right: 1.5%;
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: clamp(0.5rem, 0.9vw, 0.8rem);
  color: #2a2a2a;
  letter-spacing: 0.15em;
  opacity: 0;
  animation: hintFade 1s ease 2.8s forwards;
}

@keyframes hintFade { to { opacity: 1; } }
</style>
</head>
<body>

<div class="stage" id="stage">

  <div class="flash"></div>
  <div class="burst"></div>
  <div class="scanlines"></div>

  <!-- Crown SVG -->
  <div class="crown">
    <svg viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
      <polygon
        points="5,44 5,16 24,34 40,7 56,34 75,16 75,44"
        fill="#C9A84C"/>
      <rect x="5" y="37" width="70" height="7" rx="2" fill="#C9A84C"/>
      <circle cx="5"  cy="16" r="4.5" fill="#C9A84C"/>
      <circle cx="40" cy="7"  r="4.5" fill="#C9A84C"/>
      <circle cx="75" cy="16" r="4.5" fill="#C9A84C"/>
      <circle cx="40" cy="40" r="3"   fill="#7A5E1E"/>
    </svg>
  </div>

  <div class="word-artificial">ARTIFICIAL</div>
  <div class="word-iman">IMAN</div>
  <div class="accent-line"></div>
  <div class="tagline">THE KING OF AI USE CASES</div>

  <div class="hint">SPACE · CLICK — REPLAY</div>

</div>

<script>
  const stage = document.getElementById('stage');
  stage.addEventListener('click', () => location.reload());
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); location.reload(); }
  });
</script>

</body>
</html>
