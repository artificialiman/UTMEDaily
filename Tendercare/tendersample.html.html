<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS3 Science Report Sheet - 3rd Term 2025/2026</title>
    <style>
        /* Reset & Print */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
        }

        .report-container {
            max-width: 1200px;
            width: 100%;
            background: white;
            padding: 40px 35px 30px 35px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Watermark (background) */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 100px;
            font-weight: 900;
            color: #d9d9d9;
            opacity: 0.2;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            letter-spacing: 6px;
            user-select: none;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Header */
        .school-header {
            text-align: center;
            border-bottom: 3px double #1a3e60;
            padding-bottom: 12px;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .school-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #1a3e60;
            text-transform: uppercase;
        }

        .school-address {
            font-size: 14px;
            color: #333;
            margin-top: 4px;
            font-weight: 500;
        }

        .school-phone {
            font-size: 14px;
            color: #333;
            margin-top: 2px;
        }

        .term-session {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin: 6px 0 16px 0;
            color: #1a3e60;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        /* Table */
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            position: relative;
            z-index: 1;
            background: white;
        }

        .report-table th {
            background: #1a3e60;
            color: white;
            padding: 8px 4px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #1a3e60;
            white-space: nowrap;
        }

        .report-table td {
            border: 1px solid #bbb;
            padding: 5px 4px;
            text-align: center;
            vertical-align: middle;
        }

        .report-table tr:nth-child(even) {
            background: #f8faff;
        }

        .report-table tr:hover {
            background: #eef3fc;
        }

        .student-name {
            text-align: left;
            padding-left: 8px;
            font-weight: 500;
            white-space: nowrap;
        }

        .subject-group {
            font-size: 11px;
            font-weight: 600;
            background: #e6edf5;
        }

        .ca-exam-header {
            font-size: 10px;
            background: #2a4e70;
        }

        .total-col {
            font-weight: 600;
        }
        .avg-col {
            font-weight: 600;
            color: #1a3e60;
        }
        .grade-col {
            font-weight: 700;
            color: #0b2a44;
        }

        .comment-col {
            text-align: left;
            font-size: 12px;
            padding-left: 8px;
            max-width: 180px;
            word-break: break-word;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 13px;
            text-align: right;
            border-top: 1px solid #ccc;
            padding-top: 10px;
            position: relative;
            z-index: 1;
            color: #333;
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                padding: 0.2in;
            }
            .report-container {
                box-shadow: none;
                padding: 15px;
                border-radius: 0;
            }
            .report-table tr:hover {
                background: inherit;
            }
            .report-table td, .report-table th {
                border-color: #555;
            }
            .watermark {
                opacity: 0.15;
            }
        }

        /* Responsive */
        @media screen and (max-width: 800px) {
            .report-container {
                padding: 15px 10px;
            }
            .school-name {
                font-size: 20px;
            }
            .report-table {
                font-size: 11px;
            }
            .report-table th, .report-table td {
                padding: 4px 2px;
            }
            .comment-col {
                max-width: 100px;
            }
        }
    </style>
</head>
<body>

<div class="report-container">
    <!-- Watermark layer -->
    <div class="watermark">TENDER CARE COMPREHENSIVE COLLEGE</div>

    <!-- School Header (from watermark document) -->
    <div class="school-header">
        <div class="school-name">TENDER CARE COMPREHENSIVE COLLEGE</div>
        <div class="school-address">Kamalo Labori Sagamu Road, Gbaga, Ogun State.</div>
        <div class="school-phone">Tel: 08149135960; 08085042982</div>
    </div>

    <!-- Term / Session -->
    <div class="term-session">THIRD TERM, 2025/2026 SESSION</div>

    <!-- Table will be injected here by JavaScript -->
    <div id="table-wrapper"></div>

    <div class="footer-note">
        <span>Generated: <span id="print-date"></span></span>
    </div>
</div>

<script>
    (function() {
        // ---- Configuration ----
        const CSV_URL = 'https://raw.githubusercontent.com/artificialiman/UTMEDaily/refs/heads/main/Notes/broadsheet_SS3_Science_2026-06-10%20(1).csv';

        // Subject list (order from CSV)
        const SUBJECTS = [
            'ENGLISH', 'MATHEMATICS', 'PHYSICS', 'CHEMISTRY', 'BIOLOGY',
            'AGRICULTURAL SCIENCE', 'GEOGRAPHY', 'CIVIC EDUCATION',
            'DATA PROCESSING', 'TRADE ENTREPRENEURSHIP'
        ];

        // Column name mappings for the CSV headers
        const SUBJECT_CA_MAP = {};
        const SUBJECT_EXAM_MAP = {};
        SUBJECTS.forEach(sub => {
            const key = sub.toUpperCase().replace(/ /g, '_');
            // CSV headers are like "ENGLISH_CA", "ENGLISH_EXAM"
            SUBJECT_CA_MAP[sub] = `${key}_CA`;
            SUBJECT_EXAM_MAP[sub] = `${key}_EXAM`;
        });

        // ---- Fetch and render ----
        async function fetchAndRender() {
            const wrapper = document.getElementById('table-wrapper');
            wrapper.innerHTML = '<p style="text-align:center; padding:30px; font-size:16px;">⏳ Loading report data...</p>';

            try {
                const resp = await fetch(CSV_URL);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const csvText = await resp.text();

                // Parse CSV
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length < 2) throw new Error('CSV appears empty.');

                const headers = lines[0].split(',').map(h => h.trim().toUpperCase());
                // Map index positions
                const idx = (name) => headers.indexOf(name);
                const idxSN = idx('S/N');
                const idxName = idx('NAMES');
                const idxTotal = idx('TOTAL');
                const idxAvg = idx('AVERAGE');
                const idxGrade = idx('GRADE');
                const idxComment = idx('ADMIN_COMMENT');

                // Build a lookup for subject CA/Exam indices
                const subIndices = SUBJECTS.map(sub => ({
                    name: sub,
                    caIdx: idx(SUBJECT_CA_MAP[sub]),
                    examIdx: idx(SUBJECT_EXAM_MAP[sub])
                }));

                // Verify required indices exist
                if (idxName === -1) throw new Error('Could not find NAMES column in CSV.');
                if (idxGrade === -1) throw new Error('Could not find GRADE column in CSV.');

                // Parse rows (skip header)
                const rows = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',').map(c => c.trim());
                    // Some rows might have fewer cols if trailing commas; pad
                    while (cols.length < headers.length) cols.push('');
                    rows.push(cols);
                }

                // Build HTML table
                let html = `<table class="report-table">
                    <thead>
                        <tr>
                            <th rowspan="2">S/N</th>
                            <th rowspan="2">NAME</th>
                            ${SUBJECTS.map(sub => `<th colspan="2" class="subject-group">${sub}</th>`).join('')}
                            <th rowspan="2" style="min-width:45px;">TOTAL</th>
                            <th rowspan="2" style="min-width:45px;">AVG</th>
                            <th rowspan="2" style="min-width:45px;">GRADE</th>
                            <th rowspan="2" style="min-width:140px;">ADMIN COMMENT</th>
                        </tr>
                        <tr>
                            ${SUBJECTS.map(() => `<th class="ca-exam-header">CA</th><th class="ca-exam-header">Exam</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>`;

                // Track if we have data
                let hasData = false;

                rows.forEach((row) => {
                    // Skip if row has no name
                    const name = row[idxName] || '';
                    if (!name.trim()) return;
                    hasData = true;

                    const sn = row[idxSN] || '';
                    const total = row[idxTotal] || '';
                    const avg = row[idxAvg] || '';
                    const grade = row[idxGrade] || '';
                    const comment = (row[idxComment] || '').trim();

                    html += `<tr>
                        <td>${sn}</td>
                        <td class="student-name">${name}</td>`;

                    // Subject scores
                    subIndices.forEach(({ caIdx, examIdx }) => {
                        const caVal = (caIdx >= 0 && caIdx < row.length) ? row[caIdx] : '';
                        const examVal = (examIdx >= 0 && examIdx < row.length) ? row[examIdx] : '';
                        html += `<td>${caVal}</td><td>${examVal}</td>`;
                    });

                    html += `<td class="total-col">${total}</td>
                        <td class="avg-col">${avg}</td>
                        <td class="grade-col">${grade}</td>
                        <td class="comment-col">${comment || '—'}</td>
                    </tr>`;
                });

                if (!hasData) {
                    html += `<tr><td colspan="${3 + SUBJECTS.length*2 + 3}" style="text-align:center; padding:20px;">No student records found in the CSV.</td></tr>`;
                }

                html += `</tbody></table>`;
                wrapper.innerHTML = html;

                // Set print date
                document.getElementById('print-date').textContent = new Date().toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });

            } catch (err) {
                wrapper.innerHTML = `<div style="padding:30px; border:1px solid #c00; background:#fee; color:#a00; border-radius:6px;">
                    <strong>⚠️ Error loading report:</strong> ${err.message}<br>
                    <span style="font-size:14px;">Make sure the CSV URL is accessible and correctly formatted.</span>
                </div>`;
                console.error('Report fetch error:', err);
            }
        }

        // Run
        fetchAndRender();
    })();
</script>

</body>
</html>
