const PI = `There was a morning — Bepo could place it exactly, though he rarely spoke of it — when he understood that a school is not its building. The old science block had burned, as local legend insisted, because of a padlocked laboratory. The new one smelled of cement and ambition, and on its first day of use, Akin had held up a circuit he had wired himself and asked, with complete seriousness, whether electricity was alive.

Bepo had not answered immediately. He had walked to the window, looked out at the courtyard where he had once failed his own Common Entrance examination, and said: 'Define alive.' The class had argued for forty minutes. No formula was derived; no syllabus objective was met. Akin had gone on, in the following year, to win the state science competition.

That was what Bepo could not explain to his family, to the Ministry, to the recruitment consultant who had emailed him twice from London. There was no line in a CV for a question asked at the right moment. There was no column in any spreadsheet for the forty minutes a class spent discovering that the boundary between science and philosophy is more porous than their textbooks implied. He had stayed, partly, because he was the only one who knew that this was happening.`;

The answer, it turned out, was less than the cost of the drinks served at the meeting. The cooperative fund was established by the end of that term. By the time Bepo handed in his resignation letter, it had run uninterrupted for nineteen years, had financed two hundred and twelve sets of materials, and had sent three students — all of whom had won external bursaries that the fund had helped them apply for — to university.

The fund did not appear in the school's official documentation. It had no logo, no acronym, no launching ceremony. When a new teacher asked about it, the explanation offered was always the same: 'Mr Bepo started it.' That was its entire institutional record. That, and the fact that it worked.`;

    text: "Which of the following is a PORTMANTEAU (blend) word?",
    options: { A: "schoolchildren", B: "blackbird", C: "smog", D: "textbook" },
    answer: 'C',
    explanation: "Portmanteau: parts of two words fused — not just joined. Smog = sm(oke) + (f)og. Brunch = br(eakfast) + (l)unch. Schoolchildren, blackbird, and textbook are compound words (two complete words joined), not blends." },

  { id: 44, subject: 'English',
    text: "Which of the following is NOT a portmanteau word?",
    options: { A: "brunch", B: "emoticon", C: "smog", D: "telephone" },
    answer: 'D',
    explanation: "'Telephone' combines two Greek roots ('tele' = far; 'phone' = sound) as a classical scholarly compound — neither is a recognisable English word being blended. Portmanteau requires blending parts of two existing English words." },

  { id: 45, subject: 'English',
    text: "Choose the sentence with correct subject-verb agreement:",
    options: { A: "'One of the students who have failed must resit.'", B: "'One of the students who has failed must resit.'", C: "'One of the students who is failed must resit.'", D: "'One of the students have failed.'" },
    answer: 'A',
    explanation: "The relative clause 'who have failed' refers to 'students' (plural), so the verb is plural: 'have'. It does NOT refer to 'one'. This is a sophisticated concord trap that regularly appears in JAMB examinations." },

  { id: 46, subject: 'English',
    text: "Which sentence correctly uses 'lie' (intransitive: to recline)?",
    options: { A: "'Yesterday, she lay the book on the table.'", B: "'He had lain the folders aside before leaving.'", C: "'The patient lay still throughout the procedure.'", D: "'She lied down after lunch.'" },
    answer: 'C',
    explanation: "'Lie' (intransitive, no object): present=lie, past=LAY, past participle=LAIN. 'The patient LAY' = past tense of 'lie' (intransitive). No object needed. 'Lay' (transitive) needs an object: 'She laid the book down.'" },

  { id: 47, subject: 'English',
    text: "Which sentence uses the preposition CORRECTLY?",
    options: { A: "'She has been ill since three weeks.'", B: "'He is angry on his brother.'", C: "'She is married to a doctor.'", D: "'I am different with you.'" },
    answer: 'C',
    explanation: "'Married TO' (not 'married with'). 'Ill FOR three weeks' ('for' + duration; 'since' + point in time). 'Angry WITH' (not 'angry on'). 'Different FROM' (not 'different with'). These preposition collocations are high-frequency JAMB traps." },

  { id: 48, subject: 'English',
    text: "Choose the sentence with CORRECT use of articles:",
    options: { A: "'She is a best student in the class.'", B: "'An best answer was selected.'", C: "'She is the most intelligent student in the class.'", D: "'He bought a umbrella.'" },
    answer: 'C',
    explanation: "Superlatives always require the definite article 'the': 'the best', 'the most intelligent'. 'A best' is ungrammatical. 'An best' violates the a/an rule (b = consonant sound → 'a'). 'A umbrella' → 'an umbrella' (vowel sound)." },

  { id: 49, subject: 'English',
    text: "Complete correctly: 'She looked forward to ___ from the committee.'",
    options: { A: "hear", B: "have heard", C: "hearing", D: "be hearing" },
    answer: 'C',
    explanation: "'Look forward to' — 'to' here is a PREPOSITION, not part of an infinitive. After a preposition, use the gerund (-ing form): 'look forward to HEARING'. The most common trap: treating 'to' as the infinitive marker." },

  { id: 50, subject: 'English',
    text: "Identify the type of sentence: 'Although the rain had started, the match continued.'",
    options: { A: "Simple", B: "Compound", C: "Complex", D: "Compound-complex" },
    answer: 'C',
    explanation: "'Although the rain had started' is a SUBORDINATE adverbial clause of concession. 'The match continued' is the MAIN clause. A complex sentence has one main clause and at least one subordinate clause." },

  { id: 51, subject: 'English',
    text: "'The White House issued a statement today' — 'the White House' is an example of:",
    options: { A: "Synecdoche", B: "Simile", C: "Metonymy", D: "Personification" },
    answer: 'C',
    explanation: "Metonymy: substituting a closely associated concept for the intended meaning. 'The White House' = the US President and administration. Compare synecdoche: 'the crown' (a part of the monarchy standing for the whole)." },

  { id: 52, subject: 'English',
    text: "The word 'sanction' is an example of a contronym (auto-antonym). This means:",
    options: { A: "It has no clear meaning", B: "It is spelled the same as another unrelated word", C: "It can mean its own opposite — to authorise OR to penalise — depending on context", D: "It is a borrowed word from Latin" },
    answer: 'C',
    explanation: "Contronyms carry opposing meanings: 'sanction' = to authorise OR to penalise. Other examples: 'cleave' = to split apart / to cling together; 'dust' = to remove dust / to apply a fine powder." },

  { id: 53, subject: 'English',
    text: "Choose the grammatically CORRECT sentence:",
    options: { A: "'The teacher made them to rewrite the essay.'", B: "'The teacher made them rewrite the essay.'", C: "'The teacher made them rewrote the essay.'", D: "'The teacher made them for rewriting the essay.'" },
    answer: 'B',
    explanation: "After causative 'make', use the BARE infinitive (without 'to'): 'made them rewrite'. The bare infinitive is also used after 'let' and 'have' (causative). After 'allow', 'force', 'expect' → use TO + infinitive." },

  { id: 54, subject: 'English',
    text: "'Had I known you were arriving today, I would have prepared food.' This is an example of:",
    options: { A: "First conditional", B: "Second conditional", C: "Third conditional", D: "Zero conditional" },
    answer: 'C',
    explanation: "Third conditional: past perfect + would have + past participle. Refers to a hypothetical PAST situation and its imagined PAST result. 'Had I known' is the inverted (literary) form of 'If I had known'. Food was not prepared." },

  { id: 55, subject: 'English',
    text: "The word 'ameliorate' most nearly means:",
    options: { A: "To worsen", B: "To eliminate entirely", C: "To improve or make more tolerable", D: "To ignore" },
    answer: 'C',
    explanation: "'Ameliorate' = to improve, alleviate, mitigate. Synonyms: improve, palliate. Antonym: worsen/exacerbate. Register: formal/academic. It does NOT mean eliminate — a common distractor in JAMB vocabulary questions." },

  { id: 56, subject: 'Biology',
    text: "The organelle responsible for ATP production through aerobic respiration is the:",
    options: { A: "Ribosome", B: "Mitochondrion", C: "Golgi apparatus", D: "Lysosome" },
    answer: 'B',
    explanation: "Mitochondria are the site of aerobic respiration — specifically the Krebs cycle and oxidative phosphorylation (electron transport chain). They produce most of the cell's ATP. Known as the 'powerhouse of the cell'." },

  { id: 57, subject: 'Biology',
    text: "Which of the following correctly distinguishes a plant cell from an animal cell?",
    options: { A: "Plant cells have mitochondria; animal cells do not", B: "Plant cells have a cell wall, chloroplasts, and a large permanent vacuole; animal cells have none of these", C: "Animal cells have a nucleus; plant cells do not", D: "Plant cells cannot undergo cell division" },
    answer: 'B',
    explanation: "Plant cell exclusive structures: cellulose cell wall, chloroplasts (in photosynthetic cells), and a large central permanent vacuole. Both plant and animal cells have a nucleus, mitochondria, ribosomes, and cell membrane." },

  { id: 58, subject: 'Biology',
    text: "The movement of water molecules from a region of higher water potential to a region of lower water potential through a selectively permeable membrane is called:",
    options: { A: "Active transport", B: "Diffusion", C: "Osmosis", D: "Facilitated diffusion" },
    answer: 'C',
    explanation: "Osmosis is specifically the movement of WATER through a selectively permeable membrane from high to low water potential (i.e., from dilute to concentrated solution). It requires no energy (passive process)." },

  { id: 59, subject: 'Biology',
    text: "A cell placed in a hypertonic solution will:",
    options: { A: "Swell and may burst (lysis)", B: "Remain unchanged", C: "Shrink as water leaves by osmosis", D: "Divide more rapidly" },
    answer: 'C',
    explanation: "Hypertonic solution = more solute (lower water potential) than the cell. Water moves OUT of the cell by osmosis → cell shrinks. In plant cells this is called plasmolysis. In animal cells the cell crenates (shrivels)." },

  { id: 60, subject: 'Biology',
    text: "In a monohybrid cross between two heterozygous parents (Aa × Aa), the phenotypic ratio of offspring is:",
    options: { A: "1:1", B: "1:2:1", C: "3:1", D: "9:3:3:1" },
    answer: 'C',
    explanation: "Aa × Aa → AA, Aa, Aa, aa (genotypic ratio 1:2:1). If A is dominant, phenotypes: 3 dominant (AA + Aa) : 1 recessive (aa) = 3:1. The 9:3:3:1 ratio is for dihybrid crosses." },

  { id: 61, subject: 'Biology',
    text: "A man with blood group A (genotype I^A i) and a woman with blood group B (genotype I^B i) have children. What blood groups are possible in their offspring?",
    options: { A: "A and B only", B: "AB only", C: "A, B, AB, and O", D: "A and O only" },
    answer: 'C',
    explanation: "Cross: I^A i × I^B i → I^A I^B (AB), I^A i (A), I^B i (B), ii (O). All four blood groups are possible. This is a classic JAMB genetics cross involving codominance and multiple alleles." },

  { id: 62, subject: 'Biology',
    text: "The condition in which a person has 47 chromosomes due to an extra chromosome 21 is called:",
    options: { A: "Turner syndrome", B: "Klinefelter syndrome", C: "Down syndrome", D: "Sickle cell anaemia" },
    answer: 'C',
    explanation: "Down syndrome (trisomy 21): 47 chromosomes, extra copy of chromosome 21, caused by non-disjunction during meiosis. Turner syndrome (45, X0): one X chromosome. Klinefelter (47, XXY): extra X in males." },

  { id: 63, subject: 'Biology',
    text: "Which of the following correctly defines an ecosystem?",
    options: { A: "All organisms of the same species in an area", B: "The physical environment alone", C: "A community of organisms interacting with each other and with their abiotic environment", D: "The total number of individuals in a population" },
    answer: 'C',
    explanation: "Ecosystem = biotic community (all living organisms) + abiotic environment (physical/chemical factors: light, temperature, water, soil). The key word is 'interacting' — both components influence each other." },

  { id: 64, subject: 'Biology',
    text: "In a food chain: Grass → Grasshopper → Frog → Snake → Eagle, the grasshopper occupies which trophic level?",
    options: { A: "First (producer)", B: "Second (primary consumer)", C: "Third (secondary consumer)", D: "Fourth (tertiary consumer)" },
    answer: 'B',
    explanation: "Trophic levels: Grass = 1st (producer). Grasshopper = 2nd (primary consumer / herbivore). Frog = 3rd (secondary consumer). Snake = 4th (tertiary consumer). Eagle = 5th (quaternary consumer)." },

  { id: 65, subject: 'Biology',
    text: "The nitrogen cycle returns nitrogen to the atmosphere through a process carried out by:",
    options: { A: "Nitrifying bacteria", B: "Nitrogen-fixing bacteria", C: "Denitrifying bacteria", D: "Decomposers" },
    answer: 'C',
    explanation: "Denitrifying bacteria (e.g. Pseudomonas denitrificans) convert nitrates in the soil back to nitrogen gas (N₂), returning it to the atmosphere. Nitrifying bacteria convert ammonium to nitrates. Nitrogen-fixing bacteria convert N₂ to ammonia." },

  { id: 66, subject: 'Biology',
    text: "Which vitamin is synthesised in the skin in the presence of sunlight?",
    options: { A: "Vitamin A", B: "Vitamin B12", C: "Vitamin C", D: "Vitamin D" },
    answer: 'D',
    explanation: "Vitamin D (calciferol) is synthesised in the skin when UV radiation from sunlight converts a cholesterol precursor (7-dehydrocholesterol) to vitamin D3. Deficiency causes rickets (children) or osteomalacia (adults)." },

  { id: 67, subject: 'Biology',
    text: "The enzyme that begins the digestion of starch in the mouth is:",
    options: { A: "Pepsin", B: "Lipase", C: "Salivary amylase (ptyalin)", D: "Trypsin" },
    answer: 'C',
    explanation: "Salivary amylase (ptyalin) is secreted by the salivary glands and begins breaking starch into maltose in the mouth. Pepsin digests proteins in the stomach. Lipase digests lipids. Trypsin digests proteins in the small intestine." },

  { id: 68, subject: 'Biology',
    text: "Bile is produced by the liver and stored in the gall bladder. Its function in digestion is to:",
    options: { A: "Chemically digest fats using enzymes", B: "Emulsify fats — breaking large fat droplets into smaller ones to increase surface area for lipase action", C: "Neutralise stomach acid only", D: "Digest proteins" },
    answer: 'B',
    explanation: "Bile contains bile salts (not enzymes) that emulsify fats — they reduce large fat globules into tiny droplets, massively increasing the surface area available for lipase to act on. Bile also neutralises stomach acid, creating the alkaline pH needed for intestinal enzymes." },

  { id: 69, subject: 'Biology',
    text: "The structure in the small intestine that increases surface area for absorption is called a:",
    options: { A: "Nephron", B: "Villus (plural: villi)", C: "Alveolus", D: "Glomerulus" },
    answer: 'B',
    explanation: "Villi are finger-like projections lining the small intestine, each containing a lacteal (for fat absorption) and a capillary network (for glucose and amino acid absorption). Microvilli on the villi's surface form the 'brush border', further increasing surface area." },

  { id: 70, subject: 'Biology',
    text: "In the human heart, the bicuspid (mitral) valve is located between:",
    options: { A: "Right atrium and right ventricle", B: "Left atrium and left ventricle", C: "Left ventricle and aorta", D: "Right ventricle and pulmonary artery" },
    answer: 'B',
    explanation: "Bicuspid (mitral) valve: left atrium → left ventricle. Tricuspid valve: right atrium → right ventricle. Semi-lunar valves guard the exits from the ventricles (pulmonary and aortic). Valves prevent backflow of blood." },

  { id: 71, subject: 'Biology',
    text: "Which blood vessels carry deoxygenated blood TO the lungs?",
    options: { A: "Pulmonary veins", B: "Pulmonary arteries", C: "Coronary arteries", D: "Hepatic portal vein" },
    answer: 'B',
    explanation: "Pulmonary arteries carry deoxygenated blood FROM the right ventricle TO the lungs for oxygenation. This is the exception to the rule that arteries carry oxygenated blood. Pulmonary VEINS return oxygenated blood to the left atrium." },

  { id: 72, subject: 'Biology',
    text: "In plants, which tissue is responsible for the transport of water and mineral salts from roots to leaves?",
    options: { A: "Phloem", B: "Xylem", C: "Cambium", D: "Epidermis" },
    answer: 'B',
    explanation: "Xylem transports water and dissolved mineral salts upward from roots to leaves (transpiration stream). Phloem transports dissolved organic solutes (mainly sucrose) from leaves to other parts (translocation). Water movement in xylem is passive; phloem requires energy." },

  { id: 73, subject: 'Biology',
    text: "The loss of water vapour from plant leaves through stomata is called:",
    options: { A: "Osmosis", B: "Translocation", C: "Transpiration", D: "Guttation" },
    answer: 'C',
    explanation: "Transpiration: evaporation of water from leaf surfaces, primarily through stomata. It drives the transpiration stream (water uptake by roots, transport through xylem). Factors affecting transpiration: light, temperature, humidity, wind." },

  { id: 74, subject: 'Biology',
    text: "Which of the following is the correct definition of sexual reproduction?",
    options: { A: "Reproduction requiring only one parent, producing genetically identical offspring", B: "Reproduction involving the fusion of two gametes from two parents, producing genetically varied offspring", C: "The division of a cell into two equal halves", D: "Reproduction by spores only" },
    answer: 'B',
    explanation: "Sexual reproduction: involves gamete formation (meiosis) and fertilisation (fusion of two haploid gametes to form a diploid zygote). Produces genetic variation. Asexual reproduction: one parent, genetically identical offspring (clones)." },

  { id: 75, subject: 'Biology',
    text: "The part of a flower that produces pollen grains is the:",
    options: { A: "Stigma", B: "Style", C: "Ovary", D: "Anther" },
    answer: 'D',
    explanation: "The anther (part of the stamen = male reproductive organ) produces and releases pollen grains (containing male gametes). The stigma receives pollen. The ovary contains ovules. The style connects stigma to ovary." },

  { id: 76, subject: 'Biology',
    text: "Darwin's theory of evolution by natural selection is based on which key observation?",
    options: { A: "Organisms acquire characteristics during their lifetime and pass them to offspring", B: "Organisms with heritable traits that improve survival and reproduction leave more offspring, causing those traits to accumulate in populations over generations", C: "Species were created separately and do not change", D: "All variation within a species is environmentally caused" },
    answer: 'B',
    explanation: "Darwin: variation exists; some variation is heritable; organisms reproduce more than can survive; individuals with advantageous heritable traits survive and reproduce more ('survival of the fittest'); advantageous traits accumulate over generations. Lamarck (option A) proposed acquired characteristics — now rejected." },

  { id: 77, subject: 'Biology',
    text: "The primary organ of excretion in humans is the:",
    options: { A: "Liver", B: "Skin", C: "Kidney", D: "Lungs" },
    answer: 'C',
    explanation: "The kidneys are the primary excretory organs — they filter blood and excrete urea, excess salts, and water as urine. The lungs excrete CO₂ and water vapour. The liver produces urea (deamination). The skin excretes some salts in sweat." },

  { id: 78, subject: 'Biology',
    text: "The functional unit of the kidney is the:",
    options: { A: "Glomerulus", B: "Nephron", C: "Loop of Henle", D: "Collecting duct" },
    answer: 'B',
    explanation: "The nephron is the structural and functional unit of the kidney. Each kidney contains approximately one million nephrons. Components: Bowman's capsule, glomerulus, proximal convoluted tubule, loop of Henle, distal convoluted tubule, collecting duct." },

  { id: 79, subject: 'Biology',
    text: "Which of the following correctly describes the process of ultrafiltration in the kidney?",
    options: { A: "Active transport of urea from blood into the tubule", B: "High blood pressure in the glomerular capillaries forces small molecules (water, glucose, urea, salts) from blood into the Bowman's capsule", C: "Reabsorption of glucose from the filtrate", D: "Secretion of urea into the collecting duct" },
    answer: 'B',
    explanation: "Ultrafiltration: blood pressure in the glomerulus is high (afferent arteriole is wider than efferent). Small molecules are forced into the Bowman's capsule — the glomerular filtrate. Large molecules (proteins, red blood cells) remain in blood." },

  { id: 80, subject: 'Biology',
    text: "The part of the brain that coordinates balance and muscular movement is the:",
    options: { A: "Cerebrum", B: "Medulla oblongata", C: "Cerebellum", D: "Hypothalamus" },
    answer: 'C',
    explanation: "Cerebellum: coordinates voluntary movement, posture, and balance. Cerebrum: conscious thought, sensory processing, voluntary movement. Medulla oblongata: controls involuntary actions (heartbeat, breathing). Hypothalamus: regulates temperature, osmoregulation, hormones." },

  { id: 81, subject: 'Biology',
    text: "Which of the following is a correct example of a reflex arc in the correct sequence?",
    options: { A: "Receptor → Sensory neurone → Relay neurone → Motor neurone → Effector", B: "Effector → Motor neurone → Relay neurone → Sensory neurone → Receptor", C: "Receptor → Motor neurone → Brain → Sensory neurone → Effector", D: "Relay neurone → Sensory neurone → Receptor → Effector → Motor neurone" },
    answer: 'A',
    explanation: "Reflex arc (correct sequence): Stimulus → Receptor → Sensory neurone → Relay neurone (in spinal cord) → Motor neurone → Effector (muscle/gland) → Response. The relay neurone is in the spinal cord, bypassing the brain for speed." },

  { id: 82, subject: 'Biology',
    text: "Insulin is secreted by the pancreas in response to high blood glucose. It acts to:",
    options: { A: "Convert glycogen to glucose (glycogenolysis)", B: "Stimulate the liver to convert glucose to glycogen (glycogenesis), lowering blood glucose", C: "Increase the rate of respiration in muscles only", D: "Suppress glucagon secretion permanently" },
    answer: 'B',
    explanation: "Insulin (from β cells of islets of Langerhans): stimulates glycogenesis (glucose → glycogen in liver and muscle), stimulates glucose uptake by cells, lowers blood glucose. Glucagon (from α cells): stimulates glycogenolysis (glycogen → glucose), raises blood glucose." },

  { id: 83, subject: 'Biology',
    text: "Which of the following is the correct Kingdom for mushrooms?",
    options: { A: "Plantae", B: "Animalia", C: "Monera", D: "Fungi" },
    answer: 'D',
    explanation: "Mushrooms belong to Kingdom Fungi. Fungi are eukaryotic, heterotrophic (absorptive), with cell walls made of chitin (not cellulose like plants). They include moulds, yeasts, and mushrooms. Not to be confused with plants (which are autotrophic)." },

  { id: 84, subject: 'Biology',
    text: "Which of the following organisms is correctly classified as a member of Kingdom Monera?",
    options: { A: "Amoeba", B: "Spirogyra", C: "Rhizobium", D: "Paramecium" },
    answer: 'C',
    explanation: "Kingdom Monera = prokaryotes (no membrane-bound nucleus). Rhizobium is a bacterium (prokaryote). Amoeba and Paramecium are Protists (eukaryotic, unicellular). Spirogyra is a green alga (Protist/Plantae depending on classification system)." },

  { id: 85, subject: 'Biology',
    text: "Photosynthesis occurs in two main stages. The light-dependent stage produces:",
    options: { A: "Glucose and CO₂", B: "ATP, NADPH, and O₂ — using light energy to split water (photolysis)", C: "Starch directly", D: "Pyruvate" },
    answer: 'B',
    explanation: "Light-dependent stage (in thylakoid membranes): light energy splits water (photolysis) → O₂ released + H⁺ ions; energy used to produce ATP and NADPH. Light-independent stage (Calvin cycle, in stroma): uses ATP and NADPH to fix CO₂ into glucose." },

  { id: 86, subject: 'Biology',
    text: "Which of the following is the correct equation for aerobic respiration?",
    options: { A: "C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP", B: "C₆H₁₂O₆ → 2C₂H₅OH + 2CO₂ + ATP", C: "6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂", D: "C₆H₁₂O₆ + 6H₂O → 6CO₂ + 6O₂ + ATP" },
    answer: 'A',
    explanation: "Aerobic respiration: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP (up to 38 ATP per glucose). Option B is anaerobic respiration (fermentation). Option C is photosynthesis. Aerobic respiration occurs in the mitochondria." },

  { id: 87, subject: 'Biology',
    text: "The vector for malaria (Plasmodium) is:",
    options: { A: "The male Anopheles mosquito", B: "The female Anopheles mosquito", C: "The female Culex mosquito", D: "The tsetse fly" },
    answer: 'B',
    explanation: "Malaria is caused by Plasmodium (a protozoan parasite) and transmitted by the FEMALE Anopheles mosquito (only females feed on blood for egg production). Tsetse fly transmits Trypanosoma (sleeping sickness). Culex mosquito transmits filariasis and some viral encephalitides." },

  { id: 88, subject: 'Biology',
    text: "Which of the following is an example of mutualism?",
    options: { A: "A tapeworm living in the human intestine", B: "Rhizobium bacteria living in legume root nodules — both organism benefit", C: "A remora fish attached to a shark", D: "A tick feeding on a dog" },
    answer: 'B',
    explanation: "Mutualism: both organisms benefit. Rhizobium fixes atmospheric nitrogen for the plant; the plant provides carbohydrates and shelter to the bacteria. Tapeworm in intestine = parasitism (host harmed). Remora on shark = commensalism (one benefits, host unaffected). Tick on dog = parasitism." },

  { id: 89, subject: 'Biology',
    text: "Which of the following is an adaptation of the root hair cell for absorption of water and minerals?",
    options: { A: "Thick cell wall and small surface area", B: "Long extension of the cell increasing surface area, thin cell wall, and no chloroplasts", C: "Large central vacuole and chloroplasts", D: "Rigid cell wall and large mitochondria only" },
    answer: 'B',
    explanation: "Root hair cell adaptations: long hair-like extension (increases surface area for absorption), thin cell wall (short diffusion path), no chloroplasts (underground, no light), large vacuole (maintains osmotic gradient), many mitochondria (active transport of minerals)." },

  { id: 90, subject: 'Biology',
    text: "The process by which species change over long periods of time through the accumulation of heritable variation is called:",
    options: { A: "Mutation only", B: "Adaptation", C: "Evolution", D: "Speciation" },
    answer: 'C',
    explanation: "Evolution is the change in heritable characteristics of biological populations over successive generations. It is driven by natural selection, mutation, genetic drift, and gene flow. Speciation is the formation of new species — a product of evolution." },

  { id: 91, subject: 'Physics',
    text: "As an ambulance siren moves TOWARD a stationary listener, the frequency heard by the listener is:",
    options: { A: "Lower than the emitted frequency", B: "Equal to the emitted frequency", C: "Higher than the emitted frequency", D: "Zero" },
    answer: 'C',
    explanation: "Doppler effect: when the source moves toward the observer, successive wavefronts are compressed → shorter wavelength → higher observed frequency. Source moving away: wavefronts spread out → lower frequency. This explains why a siren sounds different as it approaches and recedes." },

  { id: 92, subject: 'Physics',
    text: "A light ray passes from air into glass (denser medium). Which of the following correctly describes what happens?",
    options: { A: "Speed increases, wavelength increases, ray bends away from normal", B: "Speed decreases, wavelength decreases, frequency stays constant, ray bends toward normal", C: "Frequency increases, speed stays constant", D: "Speed increases, frequency decreases" },
    answer: 'B',
    explanation: "When light enters a denser medium: speed decreases (v=c/n), wavelength decreases, frequency stays constant (frequency is set by the source), and the ray bends toward the normal. The refractive index n = speed in vacuum / speed in medium." },

  { id: 93, subject: 'Physics',
    text: "The refractive index of a glass block is 2.0. What is the speed of light inside the glass? (c = 3×10⁸ m/s)",
    options: { A: "6×10⁸ m/s", B: "1.5×10⁸ m/s", C: "3×10⁸ m/s", D: "2×10⁸ m/s" },
    answer: 'B',
    explanation: "n = c/v → v = c/n = 3×10⁸/2 = 1.5×10⁸ m/s. A higher refractive index means the medium is optically denser and light travels more slowly through it. n=2 means light travels at half the speed of light in vacuum." },

  { id: 94, subject: 'Physics',
    text: "Which condition is NECESSARY for total internal reflection to occur?",
    options: { A: "Light must be in the less dense medium travelling toward the denser medium", B: "The angle of incidence must equal the angle of refraction", C: "Light must be in the denser medium AND the angle of incidence must exceed the critical angle", D: "The medium must be transparent" },
    answer: 'C',
    explanation: "Total internal reflection requires BOTH conditions: (1) light in the denser medium travelling toward the less dense medium, AND (2) angle of incidence ≥ critical angle. Neither condition alone is sufficient. Application: optical fibres, endoscopes." },

  { id: 95, subject: 'Physics',
    text: "Which type of electromagnetic radiation has the SHORTEST wavelength?",
    options: { A: "Radio waves", B: "Infrared", C: "Ultraviolet", D: "Gamma rays" },
    answer: 'D',
    explanation: "EM spectrum in order of increasing frequency / decreasing wavelength: radio → microwave → infrared → visible → ultraviolet → X-ray → gamma. Gamma rays have the shortest wavelength and highest energy/frequency." },

  { id: 96, subject: 'Physics',
    text: "What is the pressure at a depth of 5 m in water? (ρ = 1000 kg/m³, g = 10 m/s²)",
    options: { A: "500 Pa", B: "50,000 Pa", C: "5,000 Pa", D: "500,000 Pa" },
    answer: 'B',
    explanation: "P = ρgh = 1000 × 10 × 5 = 50,000 Pa = 5×10⁴ Pa. Liquid pressure is independent of the container's shape — it depends only on depth, density, and g." },

  { id: 97, subject: 'Physics',
    text: "An object immersed in water displaces 200 cm³ of water. What is the upthrust (buoyancy force)? (ρ_water = 1000 kg/m³, g = 10 m/s²)",
    options: { A: "2 N", B: "20 N", C: "0.2 N", D: "200 N" },
    answer: 'A',
    explanation: "Upthrust = weight of fluid displaced = ρVg = 1000 × (200×10⁻⁶) × 10 = 2 N. Always convert volume: 200 cm³ = 200×10⁻⁶ m³. Archimedes' Principle: upthrust equals weight of displaced fluid." },

  { id: 98, subject: 'Physics',
    text: "A gas occupies 3 L at 300 K and 1×10⁵ Pa. What volume does it occupy at 150 K at the same pressure?",
    options: { A: "6 L", B: "1.5 L", C: "3 L", D: "0.75 L" },
    answer: 'B',
    explanation: "Pressure unchanged → Charles's Law: V₁/T₁ = V₂/T₂ → V₂ = 3×150/300 = 1.5 L. Halving the absolute temperature (Kelvin) halves the volume at constant pressure. Always use Kelvin in gas law calculations." },

  { id: 99, subject: 'Physics',
    text: "The First Law of Thermodynamics states that:",
    options: { A: "Heat always flows from cold to hot", B: "The internal energy change of a system equals heat added minus work done by the system", C: "Entropy always decreases in an isolated system", D: "No heat engine can be 100% efficient because of friction alone" },
    answer: 'B',
    explanation: "First Law: ΔU = Q − W. Internal energy change = heat added (Q) minus work done BY the system (W). This is conservation of energy applied to thermodynamic systems. Second Law concerns entropy." },

  { id: 100, subject: 'Physics',
    text: "Diffraction of waves is most pronounced when the gap size is:",
    options: { A: "Much larger than the wavelength", B: "Much smaller than the wavelength", C: "Approximately equal to the wavelength", D: "Exactly twice the wavelength" },
    answer: 'C',
    explanation: "Diffraction (spreading of waves around obstacles/apertures) is greatest when gap size ≈ wavelength. If the gap is much larger, the wave passes through with little spreading. This explains why sound diffracts around corners more easily than visible light (sound has longer wavelength)." },

  { id: 101, subject: 'Physics',
    text: "In the photoelectric effect, which of the following would increase the MAXIMUM kinetic energy of emitted photoelectrons?",
    options: { A: "Increasing the intensity of the light", B: "Increasing the frequency of the light", C: "Increasing the number of photons", D: "Increasing the area of illumination" },
    answer: 'B',
    explanation: "KE_max = hf − Φ. Only frequency determines the maximum kinetic energy. Increasing intensity increases the NUMBER of photoelectrons but not their maximum energy. This was the key experimental result that could not be explained by wave theory." },

  { id: 102, subject: 'Physics',
    text: "The work function of a metal is 3.0 eV. If light of photon energy 5.0 eV falls on the metal, the maximum kinetic energy of emitted electrons is:",
    options: { A: "8.0 eV", B: "3.0 eV", C: "2.0 eV", D: "5.0 eV" },
    answer: 'C',
    explanation: "KE_max = hf − Φ = 5.0 − 3.0 = 2.0 eV. The work function is the 'entry cost' — photon energy above the work function becomes kinetic energy of the emitted electron. If photon energy < work function, no electrons are emitted." },

  { id: 103, subject: 'Physics',
    text: "A convex (diverging) mirror ALWAYS produces images that are:",
    options: { A: "Real, inverted, and magnified", B: "Virtual, upright, and diminished", C: "Real, upright, and diminished", D: "Virtual, inverted, and magnified" },
    answer: 'B',
    explanation: "Convex (diverging) mirrors always produce virtual (behind mirror), upright, and diminished images — regardless of object position. Wide field of view makes them ideal for rear-view mirrors and security mirrors." },

  { id: 104, subject: 'Physics',
    text: "Newton's Third Law of Motion is correctly illustrated by which of the following?",
    options: { A: "A book resting on a table remains at rest", B: "A net force causes acceleration proportional to mass", C: "A rocket expels exhaust gases downward, and the gases exert an equal force upward on the rocket", D: "An object in free fall accelerates at g" },
    answer: 'C',
    explanation: "N3L: equal and opposite forces act on DIFFERENT bodies. Rocket (body A) exerts force on exhaust gas (body B); gas exerts equal and opposite force on rocket. N1 = option A; N2 = option B." },

  { id: 105, subject: 'Physics',
    text: "0°C expressed in Kelvin is:",
    options: { A: "0 K", B: "273 K", C: "373 K", D: "100 K" },
    answer: 'B',
    explanation: "K = °C + 273. 0°C = 273 K. The Kelvin scale uses absolute zero (−273°C = 0 K) as its starting point. 100°C = 373 K. Absolute zero = 0 K = −273°C — the temperature at which all molecular motion would cease." },

  { id: 106, subject: 'Physics',
    text: "A mercury barometer column reads 76 cm Hg. Atmospheric pressure is approximately: (ρ_Hg = 13,600 kg/m³, g = 10 m/s²)",
    options: { A: "76 Pa", B: "13,600 Pa", C: "103,360 Pa", D: "760 Pa" },
    answer: 'C',
    explanation: "P = ρgh = 13600 × 10 × 0.76 = 103,360 Pa ≈ 1.03×10⁵ Pa. Standard atmosphere = 101,325 Pa ≈ 10⁵ Pa. Key step: convert 76 cm to 0.76 m before applying formula." },

  { id: 107, subject: 'Physics',
    text: "Which of the following obeys the inverse square law?",
    options: { A: "Gravitational force between two masses", B: "Elastic force in a spring", C: "Frictional force", D: "Buoyancy force" },
    answer: 'A',
    explanation: "Gravitational force F = Gm₁m₂/r² — the force decreases with the square of the distance (inverse square law). Electric (Coulomb's) force also obeys the inverse square law. Light intensity and radiation intensity also follow it." },

  { id: 108, subject: 'Physics',
    text: "The magnetic field lines of a bar magnet outside the magnet run from:",
    options: { A: "South pole to North pole", B: "North pole to South pole", C: "Inside the magnet only", D: "Parallel to the magnet axis" },
    answer: 'B',
    explanation: "Outside the magnet: field lines exit from the North pole and enter at the South pole (N → S). Inside the magnet: S → N (completing closed loops). Field lines never cross and are closest together where the field is strongest (at the poles)." },

  { id: 109, subject: 'Physics',
    text: "Which type of electromagnetic radiation is used in cancer radiotherapy?",
    options: { A: "Radio waves", B: "Infrared", C: "Gamma rays", D: "Microwaves" },
    answer: 'C',
    explanation: "Gamma rays have the highest energy in the EM spectrum and can penetrate deeply into tissue to destroy cancerous cells. They are produced by radioactive isotopes (e.g. Cobalt-60). X-rays are also used in some radiotherapy." },

  { id: 110, subject: 'Physics',
    text: "A 60 W lamp is connected to a 240 V supply. What current flows through it?",
    options: { A: "4 A", B: "14,400 A", C: "0.25 A", D: "0.5 A" },
    answer: 'C',
    explanation: "P = IV → I = P/V = 60/240 = 0.25 A. A 60 W bulb at 240 V draws only a quarter of an ampere. This formula applies to any electrical device: P = IV = I²R = V²/R." },

  { id: 111, subject: 'Physics',
    text: "Which of the following is an application of total internal reflection?",
    options: { A: "Periscope using flat mirrors", B: "Optical fibres for data transmission", C: "Concave mirror torch", D: "Radio wave transmission" },
    answer: 'B',
    explanation: "Optical fibres transmit light signals along glass or plastic fibres via total internal reflection — light bounces along the fibre without leaving the glass. Other TIR applications: endoscopes, diamond cutting, prisms in binoculars." },

  { id: 112, subject: 'Physics',
    text: "Two resistors of 6 Ω and 3 Ω are connected in PARALLEL to a 12 V supply. What is the combined resistance?",
    options: { A: "9 Ω", B: "2 Ω", C: "4 Ω", D: "18 Ω" },
    answer: 'B',
    explanation: "1/R_p = 1/6 + 1/3 = 1/6 + 2/6 = 3/6 → R_p = 2 Ω. In parallel, the combined resistance is always LESS than the smallest individual resistance. Total current from supply: I = V/R = 12/2 = 6 A." },

  { id: 113, subject: 'Physics',
    text: "A charge of 15 C passes through a conductor in 3 seconds. What is the electric current?",
    options: { A: "45 A", B: "5 A", C: "0.2 A", D: "18 A" },
    answer: 'B',
    explanation: "I = Q/t = 15/3 = 5 A. Current = rate of flow of charge. SI unit: Ampere (A). 1 A = 1 coulomb per second." },

  { id: 114, subject: 'Physics',
    text: "The SI unit of electric potential difference (voltage) is the Volt. 1 Volt is equivalent to:",
    options: { A: "1 Ampere per Ohm", B: "1 Joule per Coulomb", C: "1 Watt per Ampere squared", D: "1 Coulomb per Joule" },
    answer: 'B',
    explanation: "1 V = 1 J/C (one joule of energy transferred per coulomb of charge). From W = QV → V = W/Q. This relates voltage to work done per unit charge. Also: V = IR (Ohm's Law) confirms 1V = 1A × 1Ω." },

  { id: 115, subject: 'Physics',
    text: "A diode allows current to flow:",
    options: { A: "In both directions equally", B: "Only in reverse bias", C: "Only in forward bias (from p-type to n-type through the junction)", D: "Only when heated" },
    answer: 'C',
    explanation: "A diode conducts current in forward bias (positive terminal of supply connected to the p-type side) and blocks current in reverse bias. Application: rectification — converting alternating current (AC) to direct current (DC)." },

  { id: 116, subject: 'Physics',
    text: "A vehicle starts from rest and accelerates uniformly at 4 m/s² for 6 seconds. What distance does it cover?",
    options: { A: "24 m", B: "144 m", C: "72 m", D: "48 m" },
    answer: 'C',
    explanation: "s = ut + ½at² = 0 + ½×4×36 = 72 m. Or: v = u + at = 0 + 4×6 = 24 m/s. s = (u+v)/2 × t = (0+24)/2 × 6 = 72 m. Both methods give 72 m." },

  { id: 117, subject: 'Physics',
    text: "A ball is projected vertically upward at 20 m/s. What is its maximum height? (g = 10 m/s²)",
    options: { A: "40 m", B: "20 m", C: "10 m", D: "200 m" },
    answer: 'B',
    explanation: "At maximum height, v = 0. v² = u² − 2gh → 0 = 400 − 20h → h = 400/20 = 20 m. Time to reach maximum: t = u/g = 20/10 = 2 s." },

  { id: 118, subject: 'Physics',
    text: "A car moving at 15 m/s brakes with deceleration of 3 m/s². How long does it take to stop?",
    options: { A: "5 s", B: "45 s", C: "3 s", D: "0.2 s" },
    answer: 'A',
    explanation: "v = u − at → 0 = 15 − 3t → t = 15/3 = 5 s. Deceleration means a is negative in the equation: v = u + at = 15 + (−3)t = 0 → t = 5 s." },

  { id: 119, subject: 'Physics',
    text: "A stone is dropped from rest from the top of a 20 m building. How long does it take to reach the ground? (g = 10 m/s²)",
    options: { A: "1 s", B: "2 s", C: "4 s", D: "0.5 s" },
    answer: 'B',
    explanation: "s = ut + ½gt² → 20 = 0 + ½×10×t² → 20 = 5t² → t² = 4 → t = 2 s. Free fall from rest: s = ½gt²." },

  { id: 120, subject: 'Physics',
    text: "A sound wave has frequency 400 Hz in air (v = 340 m/s). What is its wavelength?",
    options: { A: "0.85 m", B: "136,000 m", C: "400 m", D: "1.18 m" },
    answer: 'A',
    explanation: "λ = v/f = 340/400 = 0.85 m. The wave equation: v = fλ. Always check units — frequency in Hz (s⁻¹), speed in m/s, wavelength in m." },

  { id: 121, subject: 'Physics',
    text: "A net force of 24 N acts on a 6 kg object. What is the acceleration produced?",
    options: { A: "144 m/s²", B: "0.25 m/s²", C: "4 m/s²", D: "18 m/s²" },
    answer: 'C',
    explanation: "Newton's Second Law: F = ma → a = F/m = 24/6 = 4 m/s². The direction of acceleration is the same as the direction of the net force." },

  { id: 122, subject: 'Physics',
    text: "A force of 40 N pushes a trolley 5 m in the direction of the force. What work is done?",
    options: { A: "8 J", B: "200 J", C: "45 J", D: "35 J" },
    answer: 'B',
    explanation: "W = Fd = 40 × 5 = 200 J. Work is done only when the force has a component in the direction of motion. If force is perpendicular to displacement, work done = 0." },

  { id: 123, subject: 'Physics',
    text: "A motor lifts a 600 N load through 5 m in 10 s. What is the power output of the motor?",
    options: { A: "3000 W", B: "300 W", C: "30 W", D: "12,000 W" },
    answer: 'B',
    explanation: "Work done = Fd = 600 × 5 = 3000 J. Power = Work/time = 3000/10 = 300 W. Power is the rate of doing work. 1 Watt = 1 Joule per second." },

  { id: 124, subject: 'Physics',
    text: "A 4 kg object moves at 5 m/s. What is its kinetic energy?",
    options: { A: "20 J", B: "10 J", C: "50 J", D: "100 J" },
    answer: 'C',
    explanation: "KE = ½mv² = ½ × 4 × 25 = 50 J. Note: v² = 5² = 25, not 5. A very common error is forgetting to square the velocity." },

  { id: 125, subject: 'Physics',
    text: "A spring with spring constant 400 N/m is compressed by 5 cm. What elastic potential energy is stored?",
    options: { A: "0.5 J", B: "10 J", C: "20 J", D: "1000 J" },
    answer: 'A',
    explanation: "EPE = ½ke² = ½ × 400 × (0.05)² = ½ × 400 × 0.0025 = 0.5 J. Key step: convert 5 cm → 0.05 m BEFORE squaring. 5 cm² ≠ (0.05 m)²." },

  { id: 126, subject: 'Chemistry',
    text: "What mass of copper is deposited when a current of 2 A flows for 965 s through CuSO₄ solution? (Cu=64, F=96500 C/mol, z=2)",
    options: { A: "1.28 g", B: "0.64 g", C: "0.32 g", D: "6.4 g" },
    answer: 'B',
    explanation: "m = ItMr/(zF) = (2 × 965 × 64)/(2 × 96500) = 123,520/193,000 = 0.64 g. Alternatively: moles e⁻ = Q/F = 1930/96500 = 0.02; moles Cu = 0.02/2 = 0.01; mass = 0.01 × 64 = 0.64 g." },

  { id: 127, subject: 'Chemistry',
    text: "In a Daniell cell (Zn | ZnSO₄ || CuSO₄ | Cu), which electrode is the ANODE and what process occurs there?",
    options: { A: "Copper anode — reduction of Cu²⁺", B: "Zinc anode — oxidation of Zn to Zn²⁺", C: "Copper anode — oxidation of Cu", D: "Zinc cathode — reduction of Zn²⁺" },
    answer: 'B',
    explanation: "Anode = oxidation (AN OX). In a galvanic (voltaic) cell, the anode is the negative terminal. Zinc is oxidised: Zn → Zn²⁺ + 2e⁻. The cathode (positive terminal) is copper: Cu²⁺ + 2e⁻ → Cu." },

  { id: 128, subject: 'Chemistry',
    text: "During the electrolysis of DILUTE NaCl solution, which product forms at the ANODE?",
    options: { A: "Chlorine gas", B: "Oxygen gas", C: "Hydrogen gas", D: "Sodium metal" },
    answer: 'B',
    explanation: "In DILUTE NaCl, water is preferentially oxidised at the anode: 2H₂O → O₂ + 4H⁺ + 4e⁻ → oxygen gas. In CONCENTRATED NaCl (brine), chloride ions are in excess and Cl₂ is discharged preferentially. This concentration distinction is critical." },

  { id: 129, subject: 'Chemistry',
    text: "Given E°(Zn²⁺/Zn) = −0.76 V and E°(Cu²⁺/Cu) = +0.34 V. What is the standard EMF of the Daniell cell?",
    options: { A: "−0.42 V", B: "0.42 V", C: "1.10 V", D: "−1.10 V" },
    answer: 'C',
    explanation: "E°cell = E°cathode − E°anode = E°(Cu²⁺/Cu) − E°(Zn²⁺/Zn) = 0.34 − (−0.76) = 0.34 + 0.76 = +1.10 V. Positive EMF confirms the reaction is spontaneous. The more negative electrode (Zn) is always the anode." },

  { id: 130, subject: 'Chemistry',
    text: "For the equilibrium N₂(g) + 3H₂(g) ⇌ 2NH₃(g), the correct Kc expression is:",
    options: { A: "[N₂][H₂]³/[NH₃]²", B: "[NH₃]²/([N₂][H₂]³)", C: "[NH₃]/([N₂][H₂])", D: "2[NH₃]/([N₂]×3[H₂])" },
    answer: 'B',
    explanation: "Kc = [products]^stoich / [reactants]^stoich. Numerator: [NH₃]² (coefficient 2). Denominator: [N₂]¹[H₂]³ (coefficients 1 and 3). Pure solids and liquids are omitted. Stoichiometric coefficients become exponents." },

  { id: 131, subject: 'Chemistry',
    text: "At equilibrium, [H₂] = 0.2 mol/L, [I₂] = 0.2 mol/L, [HI] = 0.8 mol/L for H₂ + I₂ ⇌ 2HI. What is Kc?",
    options: { A: "4", B: "8", C: "16", D: "2" },
    answer: 'C',
    explanation: "Kc = [HI]²/([H₂][I₂]) = (0.8)²/(0.2 × 0.2) = 0.64/0.04 = 16. The large Kc (>1) indicates the equilibrium lies to the right — products are favoured." },

  { id: 132, subject: 'Chemistry',
    text: "A weak acid HX has Ka = 4×10⁻⁵ mol/L. What is the pH of a 0.1 mol/L solution? (Assume x << 0.1)",
    options: { A: "5", B: "4", C: "2.7", D: "3" },
    answer: 'C',
    explanation: "[H⁺] = √(Ka × C) = √(4×10⁻⁵ × 0.1) = √(4×10⁻⁶) = 2×10⁻³ mol/L. pH = −log(2×10⁻³) = 3 − log 2 = 3 − 0.30 = 2.70. Two steps: Ka×C first, then square root for [H⁺], then pH = −log[H⁺]." },

  { id: 133, subject: 'Chemistry',
    text: "For an endothermic equilibrium reaction, raising the temperature will:",
    options: { A: "Shift equilibrium left, decreasing products", B: "Shift equilibrium right, increasing products and increasing Kc", C: "Have no effect on Kc", D: "Shift equilibrium right but decrease Kc" },
    answer: 'B',
    explanation: "Le Chatelier's Principle: increasing temperature favours the endothermic direction (absorbs heat). For an endothermic reaction, this shifts equilibrium to the right → more products → Kc increases. For exothermic reactions, temperature increase shifts left → Kc decreases." },

  { id: 134, subject: 'Chemistry',
    text: "²³⁸₉₂U undergoes alpha decay. What is the daughter nuclide produced?",
    options: { A: "²³⁴₉₀Th", B: "²³⁸₉₃Np", C: "²³⁴₉₂U", D: "²³⁴₉₁Pa" },
    answer: 'A',
    explanation: "Alpha decay: mass number decreases by 4, atomic number decreases by 2. ²³⁸₉₂U → ²³⁴₉₀Th + ⁴₂He. Mass: 238−4=234. Atomic number: 92−2=90 = Thorium (Th)." },

  { id: 135, subject: 'Chemistry',
    text: "A radioactive isotope has a half-life of 8 days. Starting with 80 g, what mass remains after 32 days?",
    options: { A: "10 g", B: "5 g", C: "20 g", D: "2.5 g" },
    answer: 'B',
    explanation: "32 days ÷ 8 days = 4 half-lives. 80 → 40 → 20 → 10 → 5 g. After each half-life, the mass halves. Formula: m = m₀ × (½)^n where n = number of half-lives." },

  { id: 136, subject: 'Chemistry',
    text: "Which of the following is classified as a WEAK acid?",
    options: { A: "HCl", B: "HNO₃", C: "HF", D: "H₂SO₄" },
    answer: 'C',
    explanation: "Despite fluorine being the most electronegative element, HF is a WEAK acid. The H−F bond is very strong, making dissociation difficult. Strong acids: HCl, HBr, HI, HNO₃, H₂SO₄, HClO₄. HF is the anomalous exception among the hydrohalic acids." },

  { id: 137, subject: 'Chemistry',
    text: "A solution has [H⁺] = 1×10⁻⁴ mol/L. What is the pH of this solution?",
    options: { A: "4", B: "−4", C: "10", D: "0.0001" },
    answer: 'A',
    explanation: "pH = −log[H⁺] = −log(10⁻⁴) = 4. pH 4 is acidic (below 7). Memory: pH = power of Hydrogen, where [H⁺] = 10^(−pH). A common error is treating the exponent directly as pH without the negative sign." },

  { id: 138, subject: 'Chemistry',
    text: "20 cm³ of 0.15 mol/L H₂SO₄ is completely neutralised by 30 cm³ of NaOH. H₂SO₄ + 2NaOH → Na₂SO₄ + 2H₂O. What is the concentration of NaOH?",
    options: { A: "0.1 mol/L", B: "0.2 mol/L", C: "0.3 mol/L", D: "0.05 mol/L" },
    answer: 'B',
    explanation: "Moles H₂SO₄ = 0.15 × (20/1000) = 0.003 mol. Moles NaOH = 2 × 0.003 = 0.006 mol (2:1 ratio). [NaOH] = 0.006/(30/1000) = 0.006/0.03 = 0.2 mol/L." },

  { id: 139, subject: 'Chemistry',
    text: "Which of the following is a correct property of Group I (alkali metals)?",
    options: { A: "They are hard metals with high melting points", B: "They form 2+ ions in reactions", C: "They react with water to produce hydrogen gas and a metal hydroxide", D: "Their reactivity decreases down the group" },
    answer: 'C',
    explanation: "2Na + 2H₂O → 2NaOH + H₂↑. Group I metals: soft, low melting points, low density, reactivity INCREASES down the group (K > Na > Li). They form +1 ions (cations). Li reacts slowly; K reacts vigorously." },

  { id: 140, subject: 'Chemistry',
    text: "The general formula for the ALKENE homologous series is:",
    options: { A: "CₙH₂ₙ₊₂", B: "CₙH₂ₙ₋₂", C: "CₙH₂ₙ", D: "CₙH₂ₙ₊₁OH" },
    answer: 'C',
    explanation: "Alkanes: CₙH₂ₙ₊₂. Alkenes (one C=C double bond): CₙH₂ₙ. Alkynes (one C≡C triple bond): CₙH₂ₙ₋₂. Alcohols: CₙH₂ₙ₊₁OH. Ethene (n=2): C₂H₄ ✓ (from CₙH₂ₙ)." },

  { id: 141, subject: 'Chemistry',
    text: "The IUPAC name of CH₃−CH(CH₃)−CH₂−OH is:",

  { id: 142, subject: 'Chemistry',
    text: "CH₂=CH₂ + H₂O → CH₃CH₂OH (in the presence of an acid catalyst). This is an example of:",
    options: { A: "Substitution", B: "Elimination", C: "Condensation", D: "Addition" },
    answer: 'D',

  { id: 143, subject: 'Chemistry',
    text: "Alkenes decolourise bromine water. Alkanes do NOT decolourise bromine water at room temperature in the dark because:",

    answer: 'A',
    explanation: "Alkene + Br₂ → dibromoalkane (addition — orange → colourless). Alkane + Br₂ in DARK: no reaction. In UV light, free radical substitution can occur. The C=C double bond (π bond) is the reactive site in alkenes that alkanes lack." },

    text: "The Haber process produces ammonia under which conditions?",

    answer: 'B',
    explanation: "N₂ + 3H₂ ⇌ 2NH₃. Conditions: 450°C, 200 atm, iron catalyst. Compromise temperature: high enough for reasonable rate, low enough for reasonable yield (exothermic reaction). Vanadium pentoxide (V₂O₅) is for the Contact process (H₂SO₄), not Haber." },

  { id: 147, subject: 'Chemistry',

  { id: 148, subject: 'Chemistry',
    text: "NH₃ has a bond angle of ~107° rather than 109.5° because:",
    options: { A: "The N−H bonds are very short", B: "The lone pair on nitrogen repels the bonding pairs more strongly than bonding pairs repel each other", C: "Nitrogen is more electronegative than hydrogen", D: "NH₃ has a linear structure" },
    answer: 'B',
    explanation: "VSEPR: lone pair−bonding pair repulsion > bonding pair−bonding pair repulsion. One lone pair on N compresses the H−N−H angles from 109.5° → 107°. Two lone pairs on O (water) compress further to 104.5°." },

  { id: 149, subject: 'Chemistry',
    text: "Which of the following has the LARGEST atomic radius?",

  { id: 150, subject: 'Chemistry',
    text: "Electronegativity increases as you move:",

    answer: 'C',
    explanation: "Electronegativity increases: → across a period (more protons, stronger pull, same shielding) and ↑ up a group (smaller atom, nucleus closer to bonding electrons). Fluorine (top-right) = most electronegative element (4.0 on Pauling scale)." },

  { id: 151, subject: 'Chemistry',
    text: "Which observation correctly identifies carbon dioxide gas?",

  { id: 152, subject: 'Chemistry',
    text: "Which allotrope of carbon conducts electricity and is used as a lubricant?",

    answer: 'B',

    text: "A compound contains 75% carbon and 25% hydrogen by mass. Its empirical formula is: (C=12, H=1)",

    answer: 'A',
    explanation: "Moles: C = 75/12 = 6.25; H = 25/1 = 25. Ratio: 6.25 : 25 = 1 : 4. Empirical formula: CH₄. The molecular formula could be CH₄, C₂H₈ etc., but empirical formula only requires the simplest whole number ratio." },

    text: "In the reaction CH₄ + Cl₂ → CH₃Cl + HCl (in UV light), the mechanism is:",

    text: "During electrolysis of dilute sulphuric acid, which gas is produced at the CATHODE (negative electrode)?",

    text: "What is the percentage by mass of nitrogen in NH₄NO₃? (N=14, H=1, O=16)",

    explanation: "Molar mass NH₄NO₃ = 14+4+14+48 = 80 g/mol. Two nitrogen atoms: 2×14 = 28. %N = (28/80) × 100 = 35%." },

    text: "The reaction between ethanol (CH₃CH₂OH) and ethanoic acid (CH₃COOH) in the presence of concentrated H₂SO₄ is an example of:",

    answer: 'B',
    explanation: "Esterification: alcohol + carboxylic acid → ester + water (H₂SO₄ catalyst). CH₃CH₂OH + CH₃COOH → CH₃COOCH₂CH₃ + H₂O. Ethyl ethanoate is the ester formed. This is a reversible (equilibrium) reaction." },

    text: "In beta-minus (β⁻) decay, a neutron converts to a proton and an electron (β particle). If ¹⁴₆C undergoes β⁻ decay, the daughter nuclide is:",
    options: { A: "¹⁴₅B", B: "¹⁰₄Be", C: "¹⁴₇N", D: "¹²₆C" },
    answer: 'C',
    explanation: "β⁻ decay: atomic number increases by 1, mass number unchanged. ¹⁴₆C → ¹⁴₇N + ⁰₋₁e (beta particle) + antineutrino. Proton count: 6+1=7 = Nitrogen. Mass unchanged: 14." },

<!-- ─── UI shell (identical to boilerplate) ─── -->

<div class="quiz-container">
  <div class="quiz-header">
    <div class="header-left">
      <span class="quiz-logo">GrantApp AI</span>
      <span class="quiz-title">Science — BEPC — JAMB Practice</span>
    </div>

    </div>
  </div>

  <div class="quiz-body-inner">
    <div class="passage-panel hidden" id="passagePanel">
      <div class="passage-header">
        <span class="passage-title-label" id="passageTitle">Comprehension Passage</span>
        <button class="btn-icon" id="passageToggleBtn">
          <i class="fas fa-compress-alt"></i> Hide Passage
        </button>
      </div>
      <div class="passage-body" id="passageBody"></div>
    </div>

    <div class="question-panel">
      <div class="question-meta">
        <span class="subject-badge" id="subjectBadge">English</span>
        <span class="question-counter">Question <span id="questionNumber">1</span> of 160</span>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options-list" id="optionsList"></div>
    </div>
  </div>

  <div class="quiz-footer">
    <button class="btn btn-secondary" id="prevBtn"><i class="fas fa-chevron-left"></i> Prev</button>
    <button class="btn btn-primary"   id="nextBtn">Next <i class="fas fa-chevron-right"></i></button>
    <button class="btn btn-danger"    id="submitBtn"><i class="fas fa-paper-plane"></i> Submit</button>
  </div>
</div>

<!-- Submit Confirmation Modal -->
<div class="modal-overlay hidden" id="submitModal">
    <div class="modal">
        <div class="modal-header"><h3>Submit Quiz?</h3></div>
        <div class="modal-body">
            <div class="summary-grid">
                <div class="summary-item"><span class="summary-label">Answered</span><span class="summary-value" id="modalAnswered">0</span></div>
                <div class="summary-item"><span class="summary-label">Skipped</span><span class="summary-value" id="modalSkipped">160</span></div>
                <div class="summary-item"><span class="summary-label">Time Left</span><span class="summary-value" id="modalTimeRemaining">80:00</span></div>
            </div>
            <div class="warning-message">
                <i class="fas fa-exclamation-triangle"></i>
                <span>You cannot change answers after submission.</span>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="cancelSubmitBtn">Cancel</button>
            <button class="btn btn-danger"    id="confirmSubmitBtn"><i class="fas fa-check"></i> Submit</button>
        </div>
    </div>
</div>

<!-- Time Up Modal -->
<div class="modal-overlay hidden" id="timeUpModal">
    <div class="modal">
        <div class="modal-header"><h3>&#8987; Time's Up!</h3></div>
        <div class="modal-body">
            <p style="color:var(--muted);font-size:0.9rem;">Your time has run out. Answers recorded.</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" id="viewResultsBtn">View Results</button>
        </div>
    </div>
</div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="quiz-app.js"></script>

<script>
(function () {
  const panel     = document.getElementById('passagePanel');
  const titleEl   = document.getElementById('passageTitle');
  const bodyEl    = document.getElementById('passageBody');
  const toggleBtn = document.getElementById('passageToggleBtn');
  const qNumEl    = document.getElementById('questionNumber');

  let collapsed = false;
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function () {
      collapsed = !collapsed;
      bodyEl.style.display = collapsed ? 'none' : '';
      toggleBtn.innerHTML  = collapsed
        ? '<i class="fas fa-expand-alt"></i> Show Passage'
        : '<i class="fas fa-compress-alt"></i> Hide Passage';
    });
  }

  function syncPassage() {
    const n = parseInt(qNumEl.textContent, 10);
    if (!n || !Array.isArray(QUESTIONS)) return;
    const q = QUESTIONS[n - 1];
    if (q && q.passage) {
      const key = q.passage.slice(0, 40);
      if (bodyEl.dataset.key !== key) {
        bodyEl.dataset.key   = key;
        titleEl.textContent  = q.passageTitle || 'Comprehension Passage';
        bodyEl.textContent   = q.passage;
        panel.scrollTop      = 0;
        collapsed            = false;
        bodyEl.style.display = '';
        if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-compress-alt"></i> Hide Passage';
      }
      panel.classList.remove('hidden');
    } else {
      panel.classList.add('hidden');
    }
  }

  new MutationObserver(syncPassage).observe(qNumEl, {
    childList: true, subtree: true, characterData: true
  });
  syncPassage();
})();
</script>
