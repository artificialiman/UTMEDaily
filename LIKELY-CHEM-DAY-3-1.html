  <style>

    .prog-wrap { padding: 0 20px 10px; }

    #qc { padding: 8px 20px 20px; }
    .qcard { background: var(--card); border: 1px solid var(--sep); border-radius: var(--r); padding: 20px; margin-bottom: 14px; }
    .qcard-top { display: flex; justify-content: space-between; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--sep); }
    .qnum { font-family: var(--mono); font-size: 11px; color: var(--ter); }
    .qtopic { font-size: 10px; padding: 3px 9px; border-radius: 99px; background: rgba(34,197,94,0.08); color: var(--accent); }
    .qtxt { font-size: 15px; line-height: 1.6; margin-bottom: 16px; }

    .opt.sel { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.08); }
    .opt.ok { border-color: var(--green); background: rgba(16,185,129,0.08); }
    .opt.no { border-color: var(--red); background: rgba(239,68,68,0.08); }
    .opt.locked { cursor: default; }
    .opt-key { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--accent); width: 20px; }
    .abtn { margin-top: 12px; width: 100%; padding: 11px; background: var(--accent); color: #000; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; }
    .abtn:disabled { opacity: 0.3; cursor: not-allowed; }
    .exp { display: none; margin-top: 12px; background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.18); border-radius: 10px; padding: 14px; font-size: 13px; }
    .exp.show { display: block; }
    .exp-mark.pos { background: rgba(16,185,129,0.15); color: var(--green); display: inline-block; padding: 3px 10px; border-radius: 6px; margin-bottom: 8px; }
    .exp-mark.neg { background: rgba(239,68,68,0.12); color: var(--red); display: inline-block; padding: 3px 10px; border-radius: 6px; margin-bottom: 8px; }
    .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,14,26,0.96); border-top: 1px solid var(--sep); padding: 12px 20px calc(env(safe-area-inset-bottom) + 12px); display: flex; gap: 10px; z-index: 200; backdrop-filter: blur(16px); }
    .submit-btn { flex: 1; padding: 13px; background: var(--accent); color: #000; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 4000; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border-radius: 16px; padding: 24px; max-width: 400px; width: 90%; }
    .timeup { position: fixed; inset: 0; background: rgba(10,14,26,0.98); display: none; align-items: center; justify-content: center; z-index: 5000; }
    .timeup.show { display: flex; }
    .timeup-box { background: var(--card); border-radius: 20px; padding: 32px; text-align: center; max-width: 360px; }
    @media print { body { background: white; color: black; } .hdr, .submit-bar, .timeup, .modal-overlay, .abtn, .score-strip { display: none; } .exp { display: block !important; } }

<script>
(function(){ var wm=document.getElementById('watermark'); if(wm){ var tile='2026 Checklist · Chemistry · '; var row=''; for(var r=0;r<8;r++) row+=tile; var html=''; for(var i=0;i<12;i++) html+='<span>'+row+'</span>'; wm.innerHTML=html; } })();

// SVG Diagrams for key chemistry concepts
var DIAGRAMS = {
  electrolysis: '<svg viewBox="0 0 400 150"><text x="200" y="15" fill="#22c55e" font-size="12" text-anchor="middle">Electrolysis of Brine</text><rect x="50" y="35" width="300" height="80" fill="none" stroke="#22c55e" stroke-width="1.5"/><rect x="70" y="30" width="10" height="90" fill="#3b82f6"/><text x="75" y="135" fill="#3b82f6" font-size="9" text-anchor="middle">Cathode (-): 2H₂O+2e⁻→H₂+2OH⁻</text><rect x="320" y="30" width="10" height="90" fill="#f59e0b"/><text x="325" y="135" fill="#f59e0b" font-size="9" text-anchor="middle">Anode (+): 2Cl⁻→Cl₂+2e⁻</text></svg>',
  daniell: '<svg viewBox="0 0 400 140"><text x="200" y="15" fill="#22c55e" font-size="12" text-anchor="middle">Daniell Cell (Zn-Cu)</text><rect x="50" y="35" width="120" height="70" fill="none" stroke="#3b82f6" stroke-width="1.5"/><text x="110" y="55" fill="#3b82f6" font-size="10" text-anchor="middle">Zn | Zn²⁺</text><text x="110" y="70" fill="var(--ter)" font-size="9" text-anchor="middle">Anode (-)</text><rect x="230" y="35" width="120" height="70" fill="none" stroke="#f59e0b" stroke-width="1.5"/><text x="290" y="55" fill="#f59e0b" font-size="10" text-anchor="middle">Cu²⁺ | Cu</text><text x="290" y="70" fill="var(--ter)" font-size="9" text-anchor="middle">Cathode (+)</text><line x1="170" y1="50" x2="230" y2="50" stroke="#22c55e" stroke-dasharray="4"/><text x="200" y="45" fill="#22c55e" font-size="9" text-anchor="middle">Salt bridge</text><path d="M170,90 L230,90" stroke="#22c55e" stroke-width="1.5"/><text x="200" y="105" fill="#22c55e" font-size="9" text-anchor="middle">e⁻ flow</text></svg>'
};

// FULL CHEMISTRY QUESTIONS (40) as provided
const QUESTIONS = [
  { id:1, subj:'Chemistry', topic:'Physical vs Chemical Change', text:'Which of the following is a CHEMICAL change?', opts:{ A:'Melting of ice', B:'Boiling of water', C:'Rusting of iron', D:'Dissolving salt in water' }, ans:'C', exp:'Rusting (oxidation of iron: 4Fe + 3O₂ → 2Fe₂O₃) is irreversible and produces a new substance — a chemical change. Melting, boiling, and dissolving are physical changes: no new substance is formed and the process is reversible.' },
  { id:2, subj:'Chemistry', topic:'Mixtures', text:'Which of the following BEST defines a mixture?', opts:{ A:'A substance made of one type of atom only', B:'Two or more substances combined chemically in fixed proportions', C:'Two or more substances combined physically, retaining individual properties', D:'A compound that can be separated by filtration' }, ans:'C', exp:'A mixture contains two or more substances physically combined — each retains its own properties and they can be separated by physical means (filtration, distillation, etc.). No chemical reaction occurs during mixing.' },
  { id:3, subj:'Chemistry', topic:'Electrochemistry', text:'In the electrolysis of aqueous NaCl, calculate the charge passed if 0.5 mol of electrons are transferred. (F = 96500 C/mol)', opts:{ A:'193 000 C', B:'48 250 C', C:'96 500 C', D:'965 C' }, ans:'B', exp:'Charge Q = n × F = 0.5 × 96500 = 48 250 C. The Faraday constant (96500 C/mol) represents the charge carried by one mole of electrons.' },
  { id:4, subj:'Chemistry', topic:'Electrochemistry', text:'In electrolysis using a PLATINUM electrode, platinum is preferred as the anode material because:', opts:{ A:'It actively participates in the electrode reaction', B:'It is inert and does not dissolve or react during electrolysis', C:'It increases the rate of reduction at the cathode', D:'It lowers the activation energy of the reaction' }, ans:'B', exp:'Platinum is an inert electrode — it does not react with the electrolyte or dissolve during electrolysis. This makes it ideal for experiments where electrode material must not affect results, unlike active electrodes (copper, zinc) which dissolve.' },
  { id:5, subj:'Chemistry', topic:'Thermodynamics', text:'A reaction has ΔG = −275 kJ/mol. This reaction is:', opts:{ A:'Non-spontaneous; energy input is required', B:'At equilibrium; no net reaction occurs', C:'Spontaneous; it proceeds without external energy input', D:'Spontaneous only at high temperatures' }, ans:'C', exp:'A negative ΔG (Gibbs free energy) indicates a spontaneous reaction — it proceeds on its own under the given conditions without requiring energy input. ΔG < 0 = spontaneous; ΔG > 0 = non-spontaneous; ΔG = 0 = equilibrium.' },
  { id:6, subj:'Chemistry', topic:'Environmental', text:'The GREENHOUSE EFFECT is primarily caused by:', opts:{ A:'Depletion of the ozone layer by CFCs', B:'Trapping of infrared radiation by gases like CO₂, CH₄ and H₂O vapour', C:'Increased UV radiation reaching the Earth\'s surface', D:'Acid rain dissolving carbonate rocks' }, ans:'B', exp:'Greenhouse gases (CO₂, CH₄, N₂O, H₂O) absorb outgoing infrared (heat) radiation from the Earth\'s surface and re-emit it, trapping heat in the atmosphere. This causes global warming. It is distinct from ozone depletion.' },
  { id:7, subj:'Chemistry', topic:'Electrolysis', text:'In the electrolysis of concentrated brine (NaCl solution), the product at the CATHODE is:', opts:{ A:'Chlorine gas', B:'Oxygen gas', C:'Sodium metal', D:'Hydrogen gas' }, ans:'D', exp:'At the cathode (reduction): 2H₂O + 2e⁻ → H₂ + 2OH⁻. Water is preferentially reduced over Na⁺ because Na⁺ has a very negative electrode potential. H₂ gas is produced. NaOH accumulates in solution.' },
  { id:8, subj:'Chemistry', topic:'Electrolysis', text:'The three products of the industrial electrolysis of brine are:', opts:{ A:'Sodium, Chlorine, Water', B:'Hydrogen, Chlorine, Sodium hydroxide', C:'Oxygen, Sodium, Hydrogen', D:'Chlorine, Oxygen, Sodium chloride' }, ans:'B', exp:'Industrial chlor-alkali process: Cathode → H₂↑; Anode → Cl₂↑; Solution → NaOH. These three products are used to make plastics (Cl₂), soap/paper (NaOH), and fuel cells/fertilisers (H₂).' },
  { id:9, subj:'Chemistry', topic:'Stoichiometry', text:'What mass of sodium (Na = 23) is deposited when 2 moles of electrons are passed through molten NaCl?', opts:{ A:'23 g', B:'46 g', C:'11.5 g', D:'92 g' }, ans:'B', exp:'Na⁺ + e⁻ → Na. 1 mole of electrons deposits 1 mole of Na = 23 g. 2 moles of electrons deposit 2 × 23 = 46 g of sodium.' },
  { id:10, subj:'Chemistry', topic:'Physical vs Chemical', text:'Which of the following changes is PHYSICAL?', opts:{ A:'Burning of wood', B:'Fermentation of glucose', C:'Sublimation of iodine', D:'Neutralisation of an acid' }, ans:'C', exp:'Sublimation (solid → gas directly) is a physical change — iodine changes state but its chemical identity remains I₂. No new substance is formed. Burning, fermentation, and neutralisation all produce new chemical substances.' },
  { id:11, subj:'Chemistry', topic:'Gas Laws', text:'A gas occupies 500 cm³ at 27°C and 1 atm. What volume does it occupy at 127°C and 1 atm?', opts:{ A:'667 cm³', B:'250 cm³', C:'1000 cm³', D:'375 cm³' }, ans:'A', exp:'Charles\' Law: V₁/T₁ = V₂/T₂. T₁ = 300 K, T₂ = 400 K. V₂ = 500 × 400/300 = 666.7 ≈ 667 cm³.' },
  { id:12, subj:'Chemistry', topic:'Gas Laws', text:'A gas at 2 atm occupies 3 dm³. At constant temperature, what pressure is needed to compress it to 1 dm³?', opts:{ A:'1 atm', B:'4 atm', C:'6 atm', D:'3 atm' }, ans:'C', exp:'Boyle\'s Law: P₁V₁ = P₂V₂. 2 × 3 = P₂ × 1. P₂ = 6 atm.' },
  { id:13, subj:'Chemistry', topic:'Gas Laws', text:'Which gas law states that at constant volume, the pressure of a gas is directly proportional to its absolute temperature?', opts:{ A:'Boyle\'s Law', B:'Charles\' Law', C:'Gay-Lussac\'s Law', D:'Avogadro\'s Law' }, ans:'C', exp:'Gay-Lussac\'s Law: P/T = constant (at constant volume). P ∝ T.' },
  { id:14, subj:'Chemistry', topic:'Isomerism', text:'Which pair of compounds are STRUCTURAL ISOMERS?', opts:{ A:'CH₃CH₂OH and CH₃OCH₃', B:'CH₄ and C₂H₆', C:'CH₃OH and C₂H₅OH', D:'Ethene and ethane' }, ans:'A', exp:'Ethanol (CH₃CH₂OH) and methoxymethane (CH₃OCH₃) are structural isomers — both have molecular formula C₂H₆O but different structural arrangements.' },
  { id:15, subj:'Chemistry', topic:'Isomerism', text:'How many structural isomers does butane (C₄H₁₀) have?', opts:{ A:'1', B:'2', C:'3', D:'4' }, ans:'B', exp:'Butane has 2 structural isomers: n-butane and isobutane/methylpropane.' },
  { id:16, subj:'Chemistry', topic:'Isomerism', text:'Which type of isomerism is exhibited by but-1-ene and but-2-ene?', opts:{ A:'Chain isomerism', B:'Position isomerism', C:'Functional group isomerism', D:'Geometric isomerism' }, ans:'B', exp:'But-1-ene and but-2-ene have the same carbon chain and functional group (C=C) but differ in the position of the double bond — position isomerism.' },
  { id:17, subj:'Chemistry', topic:'Empirical Formula', text:'A compound contains 40% carbon, 6.7% hydrogen and 53.3% oxygen by mass. Its empirical formula is: (C=12, H=1, O=16)', opts:{ A:'CH₂O', B:'C₂H₄O₂', C:'CHO', D:'C₂H₂O' }, ans:'A', exp:'Mole ratios: C=40/12=3.33, H=6.7/1=6.7, O=53.3/16=3.33. Divide by smallest (3.33): C:H:O = 1:2:1. Empirical formula = CH₂O.' },
  { id:18, subj:'Chemistry', topic:'Molecular Formula', text:'A compound with empirical formula CH₂ has a molar mass of 56 g/mol. Its molecular formula is:', opts:{ A:'C₂H₄', B:'C₃H₆', C:'C₄H₈', D:'C₅H₁₀' }, ans:'C', exp:'Empirical mass = 14. n = 56/14 = 4. Molecular formula = (CH₂)₄ = C₄H₈.' },
  { id:19, subj:'Chemistry', topic:'Separation', text:'Which separation technique would BEST separate a mixture of sand and salt?', opts:{ A:'Fractional distillation', B:'Dissolve in water, filter, then evaporate', C:'Chromatography', D:'Sublimation' }, ans:'B', exp:'Salt dissolves in water; sand does not. Dissolving + filtration removes sand. Evaporating the filtrate recovers salt crystals.' },
  { id:20, subj:'Chemistry', topic:'Separation', text:'Fractional distillation is used to separate mixtures based on differences in:', opts:{ A:'Solubility', B:'Density', C:'Boiling points', D:'Particle size' }, ans:'C', exp:'Fractional distillation separates miscible liquids with different boiling points.' },
  { id:21, subj:'Chemistry', topic:'Phase Changes', text:'During the process of CONDENSATION:', opts:{ A:'A liquid absorbs heat and becomes a gas', B:'A gas releases heat and becomes a liquid', C:'A solid absorbs heat and becomes a liquid', D:'A liquid releases heat and becomes a solid' }, ans:'B', exp:'Condensation = gas → liquid, with heat released (exothermic).' },
  { id:22, subj:'Chemistry', topic:'Molarity', text:'What is the molarity of a solution containing 4 g of NaOH dissolved in 500 cm³ of solution? (Na=23, O=16, H=1)', opts:{ A:'0.1 mol/dm³', B:'0.2 mol/dm³', C:'0.4 mol/dm³', D:'8 mol/dm³' }, ans:'B', exp:'Molar mass NaOH = 40 g/mol. Moles = 4/40 = 0.1 mol. Volume = 0.5 dm³. Molarity = 0.1/0.5 = 0.2 mol/dm³.' },
  { id:23, subj:'Chemistry', topic:'Molarity', text:'How many moles of H₂SO₄ are present in 250 cm³ of a 2 mol/dm³ solution?', opts:{ A:'0.25 mol', B:'0.5 mol', C:'1 mol', D:'2 mol' }, ans:'B', exp:'Moles = Molarity × Volume (dm³) = 2 × 0.25 = 0.5 mol.' },
  { id:24, subj:'Chemistry', topic:'Electrode Potential', text:'The standard electrode potential (E°) of a half-cell measures:', opts:{ A:'The voltage generated when two different electrodes are connected', B:'The tendency of a species to be oxidised, measured against the standard hydrogen electrode', C:'The tendency of a species to gain or lose electrons relative to the standard hydrogen electrode (E° = 0 V)', D:'The current flow in an electrochemical cell' }, ans:'C', exp:'E° is measured relative to the Standard Hydrogen Electrode (SHE, E° = 0.00 V) under standard conditions.' },
  { id:25, subj:'Chemistry', topic:'Electrode Potential', text:'Given: Zn²⁺/Zn E° = −0.76 V; Cu²⁺/Cu E° = +0.34 V. The EMF of the Daniell cell is:', opts:{ A:'−0.42 V', B:'0.42 V', C:'1.10 V', D:'−1.10 V' }, ans:'C', exp:'EMF = E°(cathode) − E°(anode) = +0.34 − (−0.76) = 1.10 V.' },
  { id:26, subj:'Chemistry', topic:'Nuclear', text:'In the nuclear equation: ²³⁸₉₂U → ²³⁴₉₀Th + X. What is X?', opts:{ A:'Beta particle (⁰₋₁e)', B:'Gamma ray (⁰₀γ)', C:'Alpha particle (⁴₂He)', D:'Neutron (¹₀n)' }, ans:'C', exp:'Mass number: 238 = 234 + 4. Atomic number: 92 = 90 + 2. X is an alpha particle ⁴₂He.' },
  { id:27, subj:'Chemistry', topic:'Nuclear', text:'The half-life of a radioactive substance is 8 days. What fraction remains after 24 days?', opts:{ A:'½', B:'¼', C:'⅛', D:'¹⁄₁₆' }, ans:'C', exp:'24 days ÷ 8 days = 3 half-lives. After 3 half-lives: (½)³ = ⅛ remains.' },
  { id:28, subj:'Chemistry', topic:'Industrial', text:'In the Contact Process, the catalyst used in the oxidation of SO₂ to SO₃ is:', opts:{ A:'Iron (Fe)', B:'Platinum (Pt)', C:'Vanadium(V) oxide (V₂O₅)', D:'Nickel (Ni)' }, ans:'C', exp:'2SO₂ + O₂ → 2SO₃ is catalysed by V₂O₅ at ~450°C.' },
  { id:29, subj:'Chemistry', topic:'Industrial', text:'The Haber Process produces ammonia. The raw materials are:', opts:{ A:'Hydrogen and oxygen', B:'Nitrogen and hydrogen', C:'Nitrogen and oxygen', D:'Methane and steam' }, ans:'B', exp:'N₂ + 3H₂ ⇌ 2NH₃. Nitrogen from air, hydrogen from methane reforming.' },
  { id:30, subj:'Chemistry', topic:'Organic Tests', text:'Which reagent is used to TEST FOR a C=C double bond?', opts:{ A:'Fehling\'s solution', B:'Bromine water (Br₂/H₂O)', C:'Benedict\'s solution', D:'Tollens\' reagent' }, ans:'B', exp:'Bromine water is decolourised (orange → colourless) by alkenes (C=C).' },

const SECTIONS = [{ beforeId: 1, icon: '⚗️', title: 'Chemistry', meta: '40 Questions · Physical/Chemical Change · Electrolysis · Gas Laws · Isomerism · Empirical Formula · Separation · Molarity · Electrode Potentials · Nuclear · Industrial · Organic Tests · Dipole Moment · Salts · Solubility · Stoichiometry · Quantum Numbers' }];

var SHUFFLED_ANS = {};
function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function buildShuffledOpts(q){
  let entries=[{origKey:'A',text:q.opts.A},{origKey:'B',text:q.opts.B},{origKey:'C',text:q.opts.C},{origKey:'D',text:q.opts.D}];
  entries=shuffleArray(entries);
  let newOpts={}, newAns=q.ans;
  ['A','B','C','D'].forEach((lbl,idx)=>{ newOpts[lbl]=entries[idx].text; if(entries[idx].origKey===q.ans) newAns=lbl; });
  return {opts:newOpts, ans:newAns};
}

let ST={correct:0,wrong:0,answered:0,answeredIds:new Set()}, UA={}, globalDone=false, GLOBAL_SECS=1800, timerInterval=null;
function startTimer(){ let remaining=GLOBAL_SECS, txt=document.getElementById('gtime'); function fmt(s){ let m=Math.floor(s/60),ss=s%60; return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss; } txt.textContent=fmt(remaining); timerInterval=setInterval(()=>{ remaining--; txt.textContent=fmt(remaining); if(remaining<=0){ clearInterval(timerInterval); timeUp(); } },1000); }
function stopTimer(){ if(timerInterval) clearInterval(timerInterval); }
function render(){
  let container=document.getElementById('qc'), TOTAL=QUESTIONS.length, sectionMap={}; SECTIONS.forEach(s=>sectionMap[s.beforeId]=s);
  let html='';
  for(let i=0;i<QUESTIONS.length;i++){
    let q=QUESTIONS[i];
    if(sectionMap[q.id]){ let s=sectionMap[q.id]; html+=`<div class="subj-divider"><span class="subj-divider-icon">${s.icon}</span><div><div class="subj-divider-title">${s.title}</div><div class="subj-divider-meta">${s.meta}</div></div></div>`; }
    let shuffled=buildShuffledOpts(q); SHUFFLED_ANS[q.id]=shuffled.ans;
    let diagramHtml=''; if(q.id===7||q.id===8) diagramHtml=`<div class="qdiagram">${DIAGRAMS.electrolysis}</div>`; if(q.id===25) diagramHtml=`<div class="qdiagram">${DIAGRAMS.daniell}</div>`;
    let optsHtml=''; ['A','B','C','D'].forEach(lbl=>{ optsHtml+=`<div class="opt" data-id="${q.id}" data-a="${lbl}"><span class="opt-key">${lbl}.</span><span class="opt-txt">${shuffled.opts[lbl]}</span></div>`; });
    html+=`<div class="qcard"><div class="qcard-top"><span class="qnum">Q${q.id} of ${TOTAL}</span>${q.topic?`<span class="qtopic">${q.topic}</span>`:''}</div>${diagramHtml}<div class="qtxt">${q.text}</div><div class="opts">${optsHtml}</div><button class="abtn" data-qid="${q.id}" disabled>Check Answer</button><div class="exp" id="exp${q.id}"></div></div>`;
  }
  container.innerHTML=html; attachListeners();
}
function attachListeners(){
  document.querySelectorAll('.opt').forEach(opt=>{ opt.addEventListener('click',function(){ if(globalDone||this.classList.contains('locked')) return; let qid=parseInt(this.dataset.id); document.querySelectorAll(`.opt[data-id="${qid}"]`).forEach(o=>o.classList.remove('sel')); this.classList.add('sel'); UA[qid]=this.dataset.a; let btn=document.querySelector(`.abtn[data-qid="${qid}"]`); if(btn) btn.disabled=false; }); });
  document.querySelectorAll('.abtn').forEach(btn=>{ btn.addEventListener('click',function(){ if(globalDone) return; let qid=parseInt(this.dataset.qid), q=QUESTIONS.find(x=>x.id===qid), chosen=UA[qid], correctLabel=SHUFFLED_ANS[qid], ok=(chosen===correctLabel); document.querySelectorAll(`.opt[data-id="${qid}"]`).forEach(o=>{ o.classList.add('locked'); o.style.pointerEvents='none'; if(o.dataset.a===correctLabel) o.classList.add('ok'); else if(o.dataset.a===chosen) o.classList.add('no'); }); let expEl=document.getElementById(`exp${qid}`), markCls=ok?'pos':'neg', markTxt=ok?'✓ Correct':`✗ Incorrect — correct answer: ${correctLabel}`; expEl.innerHTML=`<span class="exp-mark ${markCls}">${markTxt}</span>${q.exp?`<div>${q.exp}</div>`:''}`; expEl.classList.add('show'); this.disabled=true; if(!ST.answeredIds.has(qid)){ ST.answered++; ST.answeredIds.add(qid); if(ok) ST.correct++; else ST.wrong++; updateStats(); } }); });
}
function updateStats(){ let total=QUESTIONS.length, left=total-ST.answered; document.getElementById('sc-corr').textContent=ST.correct; document.getElementById('sc-wrong').textContent=ST.wrong; document.getElementById('sc-skip').textContent=left; document.getElementById('answered-count').textContent=ST.answered; document.getElementById('sub-prog').textContent=`${ST.answered}/${total} answered`; document.getElementById('m-ans').textContent=ST.answered; document.getElementById('m-left').textContent=left; document.getElementById('prog-fill').style.width=(ST.answered/total*100)+'%'; }
function showSubmitModal(){ document.getElementById('submit-modal').classList.add('show'); }
function hideSubmitModal(){ document.getElementById('submit-modal').classList.remove('show'); }
function submitQuiz(){ hideSubmitModal(); globalDone=true; stopTimer(); document.querySelectorAll('.abtn:not([disabled])').forEach(b=>b.click()); showResults(); }
function showResults(){ let total=QUESTIONS.length, pct=Math.round((ST.correct/total)*100); document.getElementById('tu-score').textContent=pct+'%'; document.getElementById('tu').classList.add('show'); }
function timeUp(){ globalDone=true; document.querySelectorAll('.opt').forEach(o=>{ o.style.pointerEvents='none'; o.classList.add('locked'); }); document.querySelectorAll('.abtn').forEach(b=>b.disabled=true); showResults(); }
function doPrint(){ document.getElementById('print-header').style.display='block'; window.print(); setTimeout(()=>{ document.getElementById('print-header').style.display='none'; },1000); }
render(); startTimer();
</script>
