<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTMEDaily · A4 — CSS &amp; Inline Styles</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --mk-bg:      #272822;
  --mk-surface: #1e1f1c;
  --mk-line:    #3e3d32;
  --mk-fg:      #f8f8f2;
  --mk-comment: #75715e;
  --mk-yellow:  #e6db74;
  --mk-orange:  #fd971f;
  --mk-red:     #f92672;
  --mk-purple:  #ae81ff;
  --mk-blue:    #66d9e8;
  --mk-green:   #a6e22e;
  --mk-ln:      #75715e;
  --mono: 'DM Mono', 'Consolas', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:var(--mk-bg); color:var(--mk-fg); font-family:var(--mono); }
.app { display:flex; flex-direction:column; height:100%; }

.topbar {
  flex-shrink:0; display:flex; align-items:center; gap:12px;
  padding:6px 14px; background:var(--mk-surface); border-bottom:1px solid var(--mk-line);
}
.dots { display:flex; gap:6px; }
.dot { width:12px; height:12px; border-radius:50%; }
.dot.r { background:#ff5f57; } .dot.y { background:#febc2e; } .dot.g { background:#28c840; }
.tb-file { font-size:12px; color:var(--mk-comment); flex:1; text-align:center; letter-spacing:.04em; }
.tb-right { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--mk-comment); }
.save-dot { width:7px; height:7px; border-radius:50%; background:var(--mk-green); transition:background .3s; }
.save-dot.dirty { background:var(--mk-orange); animation:blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.offline-pill {
  display:none; font-size:10px; padding:2px 8px; border-radius:3px;
  background:rgba(253,151,31,.1); border:1px solid rgba(253,151,31,.3); color:var(--mk-orange);
}
.offline-pill.on { display:block; }

.main { flex:1; display:flex; overflow:hidden; }

.editor { display:flex; flex-direction:column; flex:1; min-width:0; overflow:hidden; }
.ed-tabs {
  display:flex; padding:4px 8px 0;
  background:var(--mk-surface); border-bottom:1px solid var(--mk-line);
}
.etab {
  padding:4px 18px 5px; font-size:11px; color:var(--mk-comment);
  background:var(--mk-bg); border:1px solid var(--mk-line);
  border-bottom:none; border-radius:4px 4px 0 0; cursor:pointer; transition:color .15s;
}
.etab.active { color:var(--mk-fg); }
.ed-body { flex:1; display:flex; overflow:hidden; position:relative; }

.line-nums {
  width:44px; flex-shrink:0; background:var(--mk-surface); border-right:1px solid var(--mk-line);
  padding:10px 0; overflow:hidden; text-align:right;
  font-size:13px; line-height:1.6; color:var(--mk-ln); user-select:none; z-index:3;
}
.ln { padding-right:10px; display:block; }

.hl-wrap { flex:1; position:relative; overflow:hidden; }
.hl-layer {
  position:absolute; inset:0;
  font-family:var(--mono); font-size:13px; line-height:1.6;
  padding:10px 14px; white-space:pre; overflow:hidden; pointer-events:none;
  word-wrap:normal; z-index:1; color:transparent;
}
textarea {
  position:absolute; inset:0;
  background:transparent; border:none; outline:none; resize:none;
  font-family:var(--mono); font-size:13px; line-height:1.6;
  padding:10px 14px; tab-size:2; caret-color:var(--mk-fg);
  white-space:pre; overflow-wrap:normal; overflow-x:auto; overflow-y:auto;
  z-index:2; color:transparent;
}
textarea::selection { background:rgba(230,219,116,.28); color:transparent; }

.preview { width:46%; flex-shrink:0; display:flex; flex-direction:column; border-left:1px solid var(--mk-line); }
.pv-bar {
  flex-shrink:0; display:flex; align-items:center; gap:8px;
  padding:6px 12px; background:var(--mk-surface); border-bottom:1px solid var(--mk-line);
}
.pv-label { font-size:10px; color:var(--mk-comment); letter-spacing:.1em; text-transform:uppercase; }
.pv-url {
  flex:1; background:var(--mk-bg); border:1px solid var(--mk-line); border-radius:4px;
  padding:3px 10px; font-size:11px; color:var(--mk-comment);
}
.pv-btn {
  padding:3px 11px; border-radius:4px; background:var(--mk-green);
  color:var(--mk-surface); font-family:var(--mono); font-size:11px; font-weight:500;
  border:none; cursor:pointer;
}
.pv-btn:hover { opacity:.82; }
iframe { flex:1; border:none; background:#fff; }

.statusbar {
  flex-shrink:0; display:flex; align-items:center; gap:14px;
  padding:3px 12px; background:var(--mk-surface); border-top:1px solid var(--mk-line);
  font-size:10px; color:var(--mk-comment);
}
.statusbar b { color:var(--mk-blue); }
.sb-r { margin-left:auto; display:flex; gap:14px; align-items:center; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="dots">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    </div>
    <span class="tb-file">UTMEDaily &mdash; Web Practical &mdash; Assignment 4 &mdash; CSS &amp; Inline Styles</span>
    <div class="tb-right">
      <span class="offline-pill" id="offline-pill">&#9889; offline</span>
      <div class="save-dot" id="save-dot"></div>
      <span id="save-lbl">saved</span>
    </div>
  </div>

  <div class="main">
    <div class="editor">
      <div class="ed-tabs">
        <div class="etab active" id="tab-html" onclick="switchTab('html')">letter.html</div>
        <div class="etab" id="tab-css"  onclick="switchTab('css')">letter.css</div>
      </div>
      <div class="ed-body">
        <div class="line-nums" id="lnums"></div>
        <div class="hl-wrap">
          <div class="hl-layer" id="hl" aria-hidden="true"></div>
          <textarea id="ta" spellcheck="false"
            oninput="onChange()" onkeydown="onKey(event)" onscroll="onScroll(event)"
            autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        </div>
      </div>
    </div>

    <div class="preview">
      <div class="pv-bar">
        <span class="pv-label">preview</span>
        <div class="pv-url" id="pv-url">letter.html</div>
        <button class="pv-btn" onclick="render()">&#8635;</button>
      </div>
      <iframe id="pv" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

  <div class="statusbar">
    <span>Ln <b id="sb-ln">1</b></span>
    <span>Col <b id="sb-col">1</b></span>
    <span>Tags <b id="sb-tags">0</b></span>
    <div class="sb-r">
      <span id="sb-file" style="color:var(--mk-orange)">letter.html</span>
      <span id="sb-msg"></span>
    </div>
  </div>

</div>
<script>

return '<!DOCTYPE html>\n' +

'\n' +
'<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n' +

'\n' +
'  <p style="font-family: monospace; font-size: 0.78em; letter-spacing: 0.2em; text-transform: uppercase; color: #888; margin-bottom: 0.3em;">12 Blossom Avenue, Lagos &middot; +234 800 000 0000</p>\n' +
'\n' +

'\n' +
'<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n' +

'\n' +
'<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n' +

'\n' +
'<p style="font-family: Georgia, serif; font-size: 1.05em; margin-bottom: 1.2em;">Dear <span style="font-weight: bold;">Ma\'am / Sir,</span></p>\n' +
'\n' +
'\n' +
'<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n' +

'\n' +
'<p style="font-family: Georgia, serif; line-height: 1.9; font-size: 1em; margin-bottom: 1.2em; word-spacing: 0.04em;">\n' +

'\n' +
'<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n' +

'\n' +

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Colorize contents of style="..." inline CSS
function colorizeInlineCSS(raw) {
  var out = '', i = 0;
  while (i < raw.length) {
    var ws = raw.slice(i).match(/^[\s\n\r]+/);
    if (ws) { out += esc(ws[0]); i += ws[0].length; continue; }
    var ci = raw.indexOf(':', i);
    if (ci === -1) { out += esc(raw.slice(i)); break; }
    out += '<span style="color:#66d9e8">' + esc(raw.slice(i, ci)) + '</span>';
    out += '<span style="color:#75715e">:</span>';
    i = ci + 1;
    var si = raw.indexOf(';', i);
    var ve = si === -1 ? raw.length : si;
    out += '<span style="color:#e6db74">' + esc(raw.slice(i, ve)) + '</span>';
    if (si !== -1) { out += '<span style="color:#75715e">;</span>'; i = ve + 1; }
    else { i = ve; }
  }
  return out;
}

// Tokenize a single HTML tag, tracking attribute name for style="" detection
function tokenTag(raw) {
  var s = raw, out = '', lastAttr = '';
  out += '<span style="color:#f8f8f2">&lt;</span>';
  s = s.slice(1);
  if (s[0] === '/') { out += '<span style="color:#f8f8f2">/</span>'; s = s.slice(1); }
  var tn = s.match(/^[a-zA-Z!][^\s>\/]*/);
  if (tn) { out += '<span style="color:#f92672">' + esc(tn[0]) + '</span>'; s = s.slice(tn[0].length); }
  while (s.length) {
    var ws = s.match(/^\s+/);
    if (ws) { out += esc(ws[0]); s = s.slice(ws[0].length); continue; }
    if (s.slice(0,2) === '/>') { out += '<span style="color:#f8f8f2">/&gt;</span>'; break; }
    if (s[0] === '>') { out += '<span style="color:#f8f8f2">&gt;</span>'; break; }
    var an = s.match(/^[^\s=>"'\/]+/);
    if (an) {
      lastAttr = an[0];
      out += '<span style="color:#a6e22e">' + esc(an[0]) + '</span>';
      s = s.slice(an[0].length); continue;
    }
    if (s[0] === '=') {
      out += '<span style="color:#f8f8f2">=</span>';
      s = s.slice(1);
      if (s[0] === '"' || s[0] === "'") {
        var q = s[0];
        var end = s.indexOf(q, 1);
        if (end === -1) end = s.length - 1;
        var val = s.slice(1, end);
        out += '<span style="color:#e6db74">' + esc(q) + '</span>';
        if (lastAttr === 'style') {
          out += colorizeInlineCSS(val);
        } else {
          out += '<span style="color:#e6db74">' + esc(val) + '</span>';
        }
        out += '<span style="color:#e6db74">' + esc(q) + '</span>';
        s = s.slice(end + 1);
      }
      continue;
    }
    out += esc(s[0]); s = s.slice(1);
  }
  return out;
}

function monokaiHTML(src) {
  var out = '', i = 0, len = src.length;
  while (i < len) {
    if (src.slice(i, i+4) === '<!--') {
      var end = src.indexOf('-->', i); end = end === -1 ? len : end + 3;
      out += '<span style="color:#75715e">' + esc(src.slice(i, end)) + '</span>';
      i = end; continue;
    }
    if (src[i] === '<') {
      var end2 = src.indexOf('>', i); end2 = end2 === -1 ? len : end2 + 1;
      out += tokenTag(src.slice(i, end2)); i = end2; continue;
    }
    if (src[i] === '&') {
      var end3 = src.indexOf(';', i); end3 = end3 === -1 ? i + 1 : end3 + 1;
      out += '<span style="color:#ae81ff">' + esc(src.slice(i, end3)) + '</span>';
      i = end3; continue;
    }
    var j = i;
    while (j < len && src[j] !== '<' && src[j] !== '&') j++;
    out += '<span style="color:#f8f8f2">' + esc(src.slice(i, j)) + '</span>';
    i = j;
  }
  return out;
}

function monokaiCSS(src) {
  var out = '', i = 0, len = src.length;
  while (i < len) {
    if (src.slice(i, i+2) === '/*') {
      var end = src.indexOf('*/', i); end = end === -1 ? len : end + 2;
      out += '<span style="color:#75715e">' + esc(src.slice(i, end)) + '</span>';
      i = end; continue;
    }
    if (src[i] === '@') {
      var m = src.slice(i).match(/^@[a-z-]+/);
      if (m) { out += '<span style="color:#f92672">' + esc(m[0]) + '</span>'; i += m[0].length; continue; }
    }
    if (src[i] === '#') {
      var h = src.slice(i).match(/^#[0-9a-fA-F]{3,8}/);
      if (h) { out += '<span style="color:#ae81ff">' + esc(h[0]) + '</span>'; i += h[0].length; continue; }
    }
    var prop = src.slice(i).match(/^([a-z][a-z-]*)(\s*:)(?!:)/);
    if (prop) {
      out += '<span style="color:#66d9e8">' + esc(prop[1]) + '</span>';
      out += '<span style="color:#75715e">' + esc(prop[2]) + '</span>';
      i += prop[0].length; continue;
    }
    var num = src.slice(i).match(/^[0-9]+\.?[0-9]*(px|pt|em|rem|%|s|ms|vw|vh)?/);
    if (num && num[0].length > 0) {
      out += '<span style="color:#ae81ff">' + esc(num[0]) + '</span>';
      i += num[0].length; continue;
    }
    if (src[i] === '{' || src[i] === '}') { out += '<span style="color:#f8f8f2">' + esc(src[i]) + '</span>'; i++; continue; }
    if (src[i] === ';') { out += '<span style="color:#75715e">;</span>'; i++; continue; }
    var j = i;
    while (j < len && !/[{};:@#\/\n]/.test(src[j])) j++;
    if (j === i) { out += esc(src[i]); i++; continue; }
    out += '<span style="color:#a6e22e">' + esc(src.slice(i, j)) + '</span>';
    i = j;
  }
  return out;
}

    html = html.replace('</head>', styleBlock + '</head>');
  } else {
    html = styleBlock + html;
  }
  doc.open(); doc.write(html); doc.close();
}

// =============================================================================
// AUTOSAVE
// =============================================================================
function markDirty() {
  document.getElementById('save-dot').classList.add('dirty');
  document.getElementById('save-lbl').textContent = 'unsaved';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 1400);
}

function persist() {
  try {
    localStorage.setItem(KEY_HTML, files.html);
    localStorage.setItem(KEY_CSS,  files.css);
    document.getElementById('save-dot').classList.remove('dirty');
    document.getElementById('save-lbl').textContent = 'saved';
  } catch(e) {
    document.getElementById('save-lbl').textContent = 'save failed';
  }
}

// =============================================================================
// NETWORK WATCH
// =============================================================================
function watchNet() {
  var pill = document.getElementById('offline-pill');
  function upd() {
    if (!navigator.onLine) { persist(); pill.classList.add('on'); }
    else { pill.classList.remove('on'); }
  }
  window.addEventListener('online',  upd);
  window.addEventListener('offline', upd);
  upd();
}
</script>
