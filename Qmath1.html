<!DOCTYPE html>
<html lang="en">

    <style>

        .timer-ring .bg { fill:none; stroke:var(--ios-separator); stroke-width:4; }

        .option.wrong    { background: rgba(255,59,48,0.1);   border-color: var(--ios-red); }

            background: var(--ios-hover);
            border-radius:8px; font-size:14px;
            color: var(--ios-text-secondary);

        .stats {

        /* hidden section */
        .section { display: none; }

    </style>
</head>

   opts:["A. [[‚ąí9, ‚ąí4], [7, 2]]","B. [[9, 4], [‚ąí7, ‚ąí2]]","C. [[5, 0], [1, 2]]","D. [[‚ąí9, 4], [7, ‚ąí2]]"], ans:"A",
   exp:"X = A‚ĀĽ¬ĻB. det(A) = 4‚ąí6 = ‚ąí2. A‚ĀĽ¬Ļ = (1/‚ąí2)[[4,‚ąí2],[‚ąí3,1]] = [[‚ąí2,1],[3/2,‚ąí1/2]]. Then multiply by B ‚ÄĒ or use cofactor expansion. The method: X = A‚ĀĽ¬ĻB, multiply from the left by the inverse of the coefficient matrix."},

  {drill:"full", topic:"JAMB-style ‚ÄĒ system with no solution",
   q:"The system 2x + 4y = 6 and x + 2y = 4 has:",
   opts:["A. No solution","B. Exactly one solution","C. Infinitely many solutions","D. Two solutions"], ans:"A",
   exp:"Matrix form: [[2,4],[1,2]]. det = 4‚ąí4 = 0. Singular ‚ÄĒ the system is either inconsistent (no solution) or dependent (infinite solutions). Checking: divide first equation by 2: x+2y=3 ‚Č† x+2y=4. Contradiction ‚ÄĒ no solution."},
]
};

// ‚ĒÄ‚ĒÄ‚ĒÄ STATE ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
let currentTab = 'poly';
let userAnswers = {};
let stats = { answered: 0, correct: 0 };
let timerIds  = {};
let timerSecs = {};
const TOTAL_SECS = 480; // 8 minutes per question
const CIRC = 2 * Math.PI * 13;

// ‚ĒÄ‚ĒÄ‚ĒÄ TAB SWITCH ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(tab + '-section').classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
}

// ‚ĒÄ‚ĒÄ‚ĒÄ RENDER ALL SECTIONS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function renderAll() {
    ['poly','quad','mat'].forEach(tab => {
        const container = document.getElementById(tab + '-section');
        const qs = data[tab];
        let html = '';
        let lastDrill = '';

        qs.forEach((q, i) => {
            if (q.drill !== lastDrill) {
                const labels = {
                    core:  {poly:'Core ¬∑ Substitution & Direct Theorem', quad:'Core ¬∑ Factorisation & Formula Reflexes', mat:'Core ¬∑ Determinant & Entry Operations'},
                    build: {poly:'Build-up ¬∑ Factor Theorem & Polynomial Structure', quad:'Build-up ¬∑ Sum/Product, Discriminant & Completing Square', mat:'Build-up ¬∑ Multiplication, Inverse & Systems'},
                    full:  {poly:'Full Questions ¬∑ JAMB-style', quad:'Full Questions ¬∑ JAMB-style', mat:'Full Questions ¬∑ JAMB-style'}
                };
                html += `<div class="drill-label ${q.drill}">${labels[q.drill][tab]}</div>`;
                lastDrill = q.drill;
            }

            const numClass = tab === 'quad' ? 'quad' : tab === 'mat' ? 'mat' : '';
            const btnClass = tab === 'quad' ? 'quad' : tab === 'mat' ? 'mat' : '';
            const key = tab + i;

            html += `
            <div class="question-card" data-index="${i}" data-tab="${tab}">
                <div class="question-number ${numClass}">${tab.toUpperCase()} ¬∑ Q${i+1} of ${qs.length} ¬∑ ${q.topic}</div>
                <div class="question-text">${q.q}</div>
                <div class="timer-row">
                    <svg class="timer-ring" id="ring-${key}" viewBox="0 0 38 38">
                        <circle class="bg" cx="19" cy="19" r="13"/>
                        <circle class="fg" cx="19" cy="19" r="13" style="stroke-dasharray:${CIRC};stroke-dashoffset:0"/>
                    </svg>
                    <span class="timer-text" id="ttext-${key}">8:00</span>
                    <span class="timer-label">left</span>
                </div>
                <div class="options">
                    ${q.opts.map(opt => `<div class="option" data-answer="${opt.charAt(0)}">${opt}</div>`).join('')}
                </div>
                <button class="answer-btn ${btnClass}" disabled>Check Answer</button>
                <div class="explanation">
                    <strong>Correct Answer: ${q.ans}</strong><br>${q.exp}
                </div>
            </div>`;
        });

        container.innerHTML = html;
    });

    attachListeners();
    startTimers('poly');
    startTimers('quad');
    startTimers('mat');
}

// ‚ĒÄ‚ĒÄ‚ĒÄ TIMERS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function startTimers(tab) {
    data[tab].forEach((_, i) => {
        const key = tab + i;
        timerSecs[key] = TOTAL_SECS;
        timerIds[key] = setInterval(() => tickTimer(i, tab, key), 1000);
    });
}

function tickTimer(i, tab, key) {
    timerSecs[key]--;
    const secs = timerSecs[key];
    if (secs <= 0) {
        clearInterval(timerIds[key]);
        timerIds[key] = null;
        updateTimerUI(key, 0);
        autoReveal(i, tab);
        return;
    }
    updateTimerUI(key, secs);
}

function updateTimerUI(key, secs) {
    const ring = document.getElementById('ring-' + key);
    const textEl = document.getElementById('ttext-' + key);
    if (!ring || !textEl) return;
    const fg = ring.querySelector('.fg');
    const offset = CIRC * (1 - secs / TOTAL_SECS);
    fg.style.strokeDashoffset = offset;
    ring.classList.remove('warning','danger');
    textEl.classList.remove('warning','danger');
    if (secs <= 96) { ring.classList.add('danger'); textEl.classList.add('danger'); }
    else if (secs <= 240) { ring.classList.add('warning'); textEl.classList.add('warning'); }
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    textEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

function stopTimer(i, tab) {
    const key = tab + i;
    if (timerIds[key]) { clearInterval(timerIds[key]); timerIds[key] = null; }
}

// ‚ĒÄ‚ĒÄ‚ĒÄ AUTO-REVEAL ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function autoReveal(i, tab) {
    const card = document.querySelector(`.question-card[data-index="${i}"][data-tab="${tab}"]`);
    if (!card) return;
    const btn = card.querySelector('.answer-btn');
    if (card.querySelector('.explanation.show')) return;
    const q = data[tab][i];
    card.querySelectorAll('.option').forEach(opt => {
        if (opt.dataset.answer === q.ans) opt.classList.add('correct');
        opt.style.pointerEvents = 'none';
    });
    card.querySelector('.explanation').classList.add('show');
    btn.disabled = true;
    const key = tab + i;
    if (!userAnswers[key]) {
        userAnswers[key] = '‚ÄĒ';
        stats.answered++;
        updateStats();
    }
}

// ‚ĒÄ‚ĒÄ‚ĒÄ LISTENERS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function attachListeners() {
    document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function () {
            const card = this.closest('.question-card');
            const i = card.dataset.index;
            const tab = card.dataset.tab;
            const key = tab + i;
            if (this.style.pointerEvents === 'none') return;
            card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
            userAnswers[key] = this.dataset.answer;
            card.querySelector('.answer-btn').disabled = false;
        });
    });

    document.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            const card = this.closest('.question-card');
            const i = +card.dataset.index;
            const tab = card.dataset.tab;
            const key = tab + i;
            const q = data[tab][i];
            const userAns = userAnswers[key];
            const isCorrect = userAns === q.ans;
            stopTimer(i, tab);
            card.querySelectorAll('.option').forEach(opt => {
                if (opt.dataset.answer === q.ans) opt.classList.add('correct');
                else if (opt.dataset.answer === userAns) opt.classList.add('wrong');
                opt.style.pointerEvents = 'none';
            });
            card.querySelector('.explanation').classList.add('show');
            this.disabled = true;
            stats.answered++;
            if (isCorrect) stats.correct++;
            updateStats();
        });
    });
}

// ‚ĒÄ‚ĒÄ‚ĒÄ STATS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function updateStats() {
    document.getElementById('answered').textContent = stats.answered;
    document.getElementById('correct').textContent = stats.correct;
    const pct = stats.answered > 0 ? Math.round(stats.correct / stats.answered * 100) : 0;
    document.getElementById('score').textContent = pct + '%';
}

// ‚ĒÄ‚ĒÄ‚ĒÄ INIT ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
renderAll();
</script>
